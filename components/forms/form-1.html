<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form / 1 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col gap-6 bg-white mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-lg min-h-96 flex flex-col">
        <div class="w-full max-w-screen-lg flex flex-col md:flex-row items-end gap-6 bg-white overflow-hidden">
          <div class="w-full max-w-screen-lg flex flex-col gap-2 min-w-0 md:w-1/2">
            <h3 class="text-2xl font-bold leading-snug text-black text-left">Account</h3>
            <p class="text-base font-normal leading-normal text-black text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
          </div>
        </div>
        <div class="w-[53%] min-h-96 flex flex-col gap-6">
          <div class="w-96 min-h-28 flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Photo</p>
            <div class="w-96 flex flex-col md:flex-row items-center gap-6 overflow-hidden">
              <figure class="w-full md:w-1/2 overflow-hidden bg-gray-100 rounded-lg flex items-center justify-center h-60" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></figure>
              <button class="w-[24%] flex flex-col md:flex-row justify-center items-center gap-2 px-5 py-2 border border-black overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg cursor-pointer">
                <p class="text-base font-normal leading-normal text-black text-left">Upload photo</p>
              </button>
            </div>
          </div>
          <div class="w-96 flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Username</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
          <div class="w-96 flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Website</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
          <div class="w-96 flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Email address</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
          <div class="w-96 flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">About</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            <p class="text-sm font-normal leading-normal text-black text-left">263 characters left</p>
          </div>
          <div class="w-96 flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Password</p>
            <div class="w-96 flex flex-col gap-4">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </div>
          </div>
          <div class="w-96 flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Language</p>
            <div class="w-96 flex flex-col md:flex-row items-center gap-4 p-3 border border-black overflow-hidden">
              <p class="text-base font-normal leading-normal text-black text-left">Select one...</p>
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
            </div>
          </div>
        </div>
      </div>
      <div class="flex flex-row items-center gap-6">
        <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Cancel</button>
        <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Save</button>
      </div>
    </article>
  </body>
</html>
