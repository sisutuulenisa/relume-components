<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Form / 19 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col md:flex-row gap-[48px] bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[41%] flex flex-col md:flex-row items-end gap-[24px] bg-[rgba(255,255,255,1.000)] w-full md:w-1/2">
        <div class="w-[436px] flex flex-col gap-[8px] w-full md:w-1/2">
          <h3 class="text-[24px] font-bold leading-[34px] text-[rgba(0,0,0,1.000)] text-left">Welcome to Relume</h3>
          <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
        </div>
      </div>
      <div class="w-[55%] flex flex-col gap-[24px] w-full md:w-1/2">
        <div class="w-[97%] flex flex-col gap-[24px]">
          <div class="w-[560px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Full name</p>
            <div class="w-[560px] h-[48px] flex flex-col md:flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]"></div>
          </div>
          <div class="w-[560px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Email address</p>
            <div class="w-[560px] flex flex-col md:flex-row items-center gap-[12px] p-[12px] border border-[rgba(0,0,0,1.000)]">
              <div class="w-[4%] overflow-hidden w-full md:w-1/2">
                <div class="w-[20px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              </div>
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,0.600)] text-left">email@example.com</p>
              <div class="w-[4%] overflow-hidden w-full md:w-1/2">
                <div class="w-[20px] h-[20px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              </div>
            </div>
          </div>
          <div class="w-[560px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">What is your company name?</p>
            <div class="w-[560px] h-[48px] flex flex-col md:flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]"></div>
          </div>
          <div class="w-[560px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">How many people are you working with?</p>
            <div class="hidden md:flex flex-row border-b border-gray-200">
              <button class="border border-gray-900 px-4 py-2 text-sm">Just me</button>
              <button class="px-4 py-2 text-sm text-gray-500">2-10</button>
              <button class="px-4 py-2 text-sm text-gray-500">11-50</button>
              <button class="px-4 py-2 text-sm text-gray-500">51-100</button>
              <button class="px-4 py-2 text-sm text-gray-500">101-500</button>
              <button class="px-4 py-2 text-sm text-gray-500">501+</button>
            </div>
          </div>
          <div class="w-[560px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Current job title</p>
            <div class="w-[560px] h-[48px] flex flex-col md:flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]"></div>
          </div>
          <div class="w-[560px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Employment type</p>
            <div class="hidden md:flex flex-row border-b border-gray-200">
              <button class="border border-gray-900 px-4 py-2 text-sm">Part-time</button>
              <button class="px-4 py-2 text-sm text-gray-500">Full-time</button>
              <button class="px-4 py-2 text-sm text-gray-500">Contract</button>
            </div>
          </div>
          <div class="w-[560px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">How did you hear about us?</p>
            <div class="w-[560px] flex flex-col md:flex-row items-center gap-[16px] p-[12px] border border-[rgba(0,0,0,1.000)]">
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Select one...</p>
              <div class="w-[4%] overflow-hidden w-full md:w-1/2">
                <div class="w-[12px] h-[7px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="flex flex-row items-center gap-[24px]">
          <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Back</button>
          <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Get started</button>
        </div>
      </div>
    </section>
  </body>
</html>
