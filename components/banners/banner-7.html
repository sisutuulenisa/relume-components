<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Banner / 7 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] flex flex-col md:flex-row items-center gap-[16px] px-[16px] py-[12px] overflow-hidden">
        <div class="w-[94%] flex flex-col md:flex-row justify-center items-center gap-[24px] overflow-hidden min-w-0 w-full md:w-1/2">
          <div class="w-[33%] flex flex-col md:flex-row items-center gap-[16px] overflow-hidden min-w-0 w-full md:w-1/2">
            <div class="w-[8%] overflow-hidden min-w-0 w-full md:w-1/2">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </div>
            <div class="w-[88%] flex flex-col min-w-0 w-full md:w-1/2">
              <p class="text-[16px] font-semibold leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Medium length banner heading goes here</p>
              <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            </div>
          </div>
          <button class="w-[7%] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] cursor-pointer">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Button</p>
          </button>
        </div>
        <div class="w-[2%] flex flex-col md:flex-row justify-end items-center gap-[16px] overflow-hidden min-w-0 w-full md:w-1/2">
          <div class="w-[32px] overflow-hidden min-w-0 w-full md:w-1/2">
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
