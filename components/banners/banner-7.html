<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Banner / 7 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center bg-white border border-[rgba(0,0,0,1.000)] overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl flex flex-col md:flex-row items-center gap-4 px-4 py-3 overflow-hidden">
        <section class="w-full max-w-screen-lg flex flex-col md:flex-row justify-center items-center gap-6 overflow-hidden min-w-0 md:w-1/2">
          <section class="w-1/3 flex flex-col md:flex-row items-center gap-4 overflow-hidden min-w-0 w-full md:w-1/2">
            <section class="w-1/12 overflow-hidden min-w-0 w-full md:w-1/2">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </section>
            <section class="w-[88%] flex flex-col min-w-0 w-full md:w-1/2">
              <p class="text-base font-semibold leading-normal text-black text-left">Medium length banner heading goes here</p>
              <p class="text-sm font-normal leading-normal text-black text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            </section>
          </section>
          <button class="w-[7%] flex flex-col md:flex-row justify-center items-center gap-2 px-5 py-2 bg-black border border-[rgba(0,0,0,1.000)] overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg cursor-pointer">
            <p class="text-base font-normal leading-normal text-white text-left">Button</p>
          </button>
        </section>
        <section class="w-[2%] flex flex-col md:flex-row justify-end items-center gap-4 overflow-hidden min-w-0 w-full md:w-1/2">
          <section class="w-8 overflow-hidden min-w-0 w-full md:w-1/2">
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </section>
        </section>
      </div>
    </article>
  </body>
</html>
