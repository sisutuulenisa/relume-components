<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Banner / 9 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[69px] flex flex-row items-center gap-[32px]">
        <div class="w-[1068px] h-[45px] flex flex-row items-center gap-[16px]">
          <div class="w-[32px] h-[32px] overflow-hidden">
            <div class="w-[24px] h-[27px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
          </div>
          <div class="w-[1020px] h-[45px] flex flex-col">
            <p class="text-[16px] font-semibold leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Medium length banner heading goes here</p>
            <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
          </div>
        </div>
        <div class="w-[180px] h-[32px] flex flex-row justify-end items-center gap-[16px]">
          <div class="w-[132px] h-[24px] flex flex-row gap-[12px]">
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[20px] h-[20px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[18px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
          </div>
          <div class="w-[32px] h-[32px] overflow-hidden">
            <div class="w-[14px] h-[14px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
