<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Banner / 5 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full mx-auto max-w-[1440px] flex flex-col items-center px-[64px] overflow-hidden">
      <div class="w-[1280px] h-[48px] flex flex-row items-center gap-[16px] px-[16px] py-[8px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)]">
        <div class="w-[1200px] h-[24px] flex flex-row justify-center">
          <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Medium length banner heading with link goes here</p>
        </div>
        <div class="w-[32px] h-[32px] overflow-hidden">
          <div class="w-[14px] h-[14px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
        </div>
      </div>
    </section>
  </body>
</html>
