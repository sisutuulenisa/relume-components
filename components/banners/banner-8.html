<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Banner / 8 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] flex flex-col md:flex-row items-center">
        <div class="w-[81%] flex flex-col md:flex-row items-center gap-[16px] w-full md:w-1/2">
          <div class="w-[3%] overflow-hidden w-full md:w-1/2">
            <div class="w-[24px] h-[27px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
          </div>
          <div class="w-[95%] flex flex-col w-full md:w-1/2">
            <p class="text-[16px] font-semibold leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Medium length banner heading goes here</p>
            <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
          </div>
        </div>
        <div class="w-[19%] flex flex-col md:flex-row justify-end items-center gap-[16px] w-full md:w-1/2">
          <div class="flex flex-row items-center gap-[24px]">
            <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
            <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
          </div>
          <div class="w-[13%] overflow-hidden w-full md:w-1/2">
            <div class="w-[14px] h-[14px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
