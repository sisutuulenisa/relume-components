<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Banner / 8 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center bg-white border border-black overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl flex flex-col md:flex-row items-center justify-between gap-6 py-3">
        <div class="flex w-full items-start gap-4 md:w-2/3">
          <span class="text-base font-bold leading-normal text-black">ⓘ</span>
          <div class="flex flex-col">
            <p class="text-base font-semibold leading-normal text-black text-left">Medium length banner heading goes here</p>
            <p class="text-sm font-normal leading-normal text-black text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
          </div>
        </div>
        <div class="flex w-full items-center justify-end gap-4 md:w-1/3">
          <div class="flex flex-row items-center gap-3">
            <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
            <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
          </div>
          <button class="text-base font-semibold leading-normal text-black">Close</button>
        </div>
      </div>
    </article>
  </body>
</html>
