<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie / 4 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col justify-end items-center gap-[80px] p-[32px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[96%] flex flex-col md:flex-row justify-end items-end gap-[24px]">
        <div class="w-[41%] flex flex-col gap-[32px] pl-[48px] pr-[32px] py-[32px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden w-full md:w-1/2">
          <div class="w-[86%] flex flex-col md:flex-row gap-[16px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">By clicking “Accept all cookies”, you agree to the storing of cookies on your device to enhance site navigation, analyze site usage, and assist in our marketing efforts. View our Privacy Policy for more information.</p>
            <div class="w-[7%] overflow-hidden w-full md:w-1/2">
              <div class="w-[14px] h-[14px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
          </div>
          <div class="w-[86%] flex flex-col justify-center gap-[16px]">
            <div class="flex flex-row items-center gap-[24px]">
              <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Reject all cookies</button>
              <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Accept all cookies</button>
            </div>
            <button class="w-[480px] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)] bg-gray-900 text-white px-[16px] py-[10px] rounded-[8px] cursor-pointer">
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Manage preferences</p>
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
