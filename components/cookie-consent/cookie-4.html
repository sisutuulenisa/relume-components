<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie / 4 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col justify-end items-center gap-20 p-8 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl flex flex-col md:flex-row justify-end items-end gap-6 overflow-hidden">
        <div class="w-2/5 min-h-76 flex flex-col gap-8 pl-12 pr-8 py-8 bg-white border border-[rgba(0,0,0,1.000)] overflow-hidden min-w-0 w-full md:w-1/2">
          <div class="w-[86%] flex flex-col md:flex-row gap-4 overflow-hidden">
            <p class="text-base font-normal leading-normal text-black text-left">By clicking “Accept all cookies”, you agree to the storing of cookies on your device to enhance site navigation, analyze site usage, and assist in our marketing efforts. View our Privacy Policy for more information.</p>
            <div class="w-[7%] overflow-hidden min-w-0 w-full md:w-1/2">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </div>
          </div>
          <div class="w-[86%] min-h-28 flex flex-col justify-center gap-4">
            <div class="flex flex-row items-center gap-6">
              <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Reject all cookies</button>
              <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Accept all cookies</button>
            </div>
            <button class="w-96 flex flex-col md:flex-row justify-center items-center gap-2 px-6 py-3 border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
              <p class="text-base font-normal leading-normal text-black text-left">Manage preferences</p>
            </button>
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
