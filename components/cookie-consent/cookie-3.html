<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Cookie / 3 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <section class="w-full flex flex-col justify-end items-center gap-[80px] p-[32px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1376px] h-[208px] flex flex-row justify-end items-end gap-[24px]">
        <div class="w-[640px] h-[208px] flex flex-row gap-[16px] pl-[48px] pr-[32px] py-[32px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden">
          <div class="w-[512px] h-[144px] flex flex-col justify-center gap-[24px]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">By clicking “Accept”, you agree to the storing of cookies on your device to enhance site navigation, analyze site usage, and assist in our marketing efforts. View our Privacy Policy for more information.</p>
            <div class="w-[317px] h-[48px] flex flex-row items-center gap-[16px]">
              <button class="w-[101px] h-[48px] flex flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Decline</p>
              </button>
              <button class="w-[98px] h-[48px] flex flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Accept</p>
              </button>
              <button class="w-[86px] h-[24px] flex flex-row justify-center items-center gap-[8px]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Preferences</p>
              </button>
            </div>
          </div>
          <div class="w-[32px] h-[32px] overflow-hidden">
            <div class="w-[14px] h-[14px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
          </div>
        </div>
      </div>
    </section>
  </body>
