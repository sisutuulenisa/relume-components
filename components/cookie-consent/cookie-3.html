<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie / 3 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col justify-end items-center gap-20 p-8 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl flex flex-col md:flex-row justify-end items-end gap-6 overflow-hidden">
        <section class="w-full max-w-screen-sm flex flex-col md:flex-row gap-4 pl-12 pr-8 py-8 bg-white border border-[rgba(0,0,0,1.000)] overflow-hidden min-w-0 md:w-1/2">
          <section class="w-[80%] min-h-36 flex flex-col justify-center gap-6 min-w-0 w-full md:w-1/2">
            <p class="text-base font-normal leading-normal text-black text-left">By clicking “Accept”, you agree to the storing of cookies on your device to enhance site navigation, analyze site usage, and assist in our marketing efforts. View our Privacy Policy for more information.</p>
            <div class="hidden md:flex flex-row border-b border-gray-200">
              <button class="border border-gray-900 px-4 py-2 text-sm">Decline</button>
              <button class="px-4 py-2 text-sm text-gray-500">Accept</button>
              <button class="px-4 py-2 text-sm text-gray-500">Preferences</button>
            </div>
          </section>
          <section class="w-[5%] overflow-hidden min-w-0 w-full md:w-1/2">
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </section>
        </section>
      </div>
    </article>
  </body>
</html>
