<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cookie / 2 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col justify-end items-center gap-20 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl flex flex-col md:flex-row justify-center items-center gap-8 pl-12 pr-8 py-12 bg-white border border-[rgba(0,0,0,1.000)] overflow-hidden">
        <div class="w-full max-w-screen-xl flex flex-col md:flex-row items-center gap-8 overflow-hidden min-w-0 md:w-1/2">
          <p class="text-base font-normal leading-normal text-black text-left">By clicking “Accept”, you agree to the storing of cookies on your device to enhance site navigation, analyze site usage, and assist in our marketing efforts. View our Privacy Policy for more information.</p>
          <div class="hidden md:flex flex-row border-b border-gray-200">
            <button class="border border-gray-900 px-4 py-2 text-sm">Preferences</button>
            <button class="px-4 py-2 text-sm text-gray-500">Decline</button>
            <button class="px-4 py-2 text-sm text-gray-500">Accept</button>
          </div>
          <div class="w-[2%] overflow-hidden min-w-0 w-full md:w-1/2">
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
