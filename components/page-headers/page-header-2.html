<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Page Header / 2 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[16px] bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px]">
      <div class="w-[1080px] h-[114px] flex flex-col gap-[16px]">
        <div class="w-[257px] h-[24px] flex flex-row items-center gap-[8px]">
          <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Link One</p>
          <div class="w-[24px] h-[24px] overflow-hidden">
            <div class="w-[7px] h-[12px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
          </div>
          <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Link Two</p>
          <div class="w-[24px] h-[24px] overflow-hidden">
            <div class="w-[7px] h-[12px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
          </div>
          <p class="text-[14px] font-semibold leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Link Three</p>
        </div>
        <div class="w-[1080px] h-[74px] flex flex-row justify-between items-end gap-[24px]">
          <div class="w-[590px] h-[74px] flex flex-col justify-center gap-[8px]">
            <h2 class="text-[32px] font-bold leading-[42px] text-[rgba(0,0,0,1.000)] text-left">Header Title</h2>
            <div class="w-[590px] h-[24px] flex flex-row flex-wrap items-center gap-[24px]">
              <div class="w-[62px] h-[24px] flex flex-row items-center gap-[4px]">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[19px] h-[19px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
                <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Label</p>
              </div>
              <div class="w-[69px] h-[24px] flex flex-row items-center gap-[4px]">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[20px] h-[20px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
                <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Status</p>
              </div>
              <div class="w-[86px] h-[24px] flex flex-row items-center gap-[4px]">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[16px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
                <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Assignee</p>
              </div>
              <div class="w-[159px] h-[24px] flex flex-row items-center gap-[4px]">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[18px] h-[20px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
                <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Created: July 1, 2023</p>
              </div>
            </div>
          </div>
          <div class="w-[456px] h-[40px] flex flex-row justify-center items-center gap-[16px]">
            <div class="w-[248px] h-[40px] flex flex-row items-center gap-[12px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)]">
              <div class="w-[24px] h-[24px] overflow-hidden">
                <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              </div>
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Search</p>
            </div>
            <button class="w-[88px] h-[40px] flex flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] border border-[rgba(0,0,0,1.000)] bg-gray-900 text-white px-[16px] py-[10px] rounded-[8px] cursor-pointer">
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Button</p>
            </button>
            <button class="w-[88px] h-[40px] flex flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)] cursor-pointer">
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Button</p>
            </button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
