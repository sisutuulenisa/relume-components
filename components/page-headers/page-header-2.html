<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Header / 2 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[16px] bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[94%] flex flex-col gap-[16px]">
        <div class="hidden md:flex flex-row border-b border-gray-200">
          <button class="border border-gray-900 px-4 py-2 text-sm">Link One</button>
          <button class="px-4 py-2 text-sm text-gray-500">Tab 2</button>
          <button class="px-4 py-2 text-sm text-gray-500">Link Two</button>
          <button class="px-4 py-2 text-sm text-gray-500">Tab 4</button>
          <button class="px-4 py-2 text-sm text-gray-500">Link Three</button>
        </div>
        <div class="w-[1080px] flex flex-col md:flex-row justify-between items-end gap-[24px]">
          <div class="w-[55%] flex flex-col justify-center gap-[8px] w-full md:w-1/2">
            <h2 class="text-[32px] font-bold leading-[42px] text-[rgba(0,0,0,1.000)] text-left">Header Title</h2>
            <div class="hidden md:flex flex-row border-b border-gray-200">
              <button class="border border-gray-900 px-4 py-2 text-sm">Label</button>
              <button class="px-4 py-2 text-sm text-gray-500">Status</button>
              <button class="px-4 py-2 text-sm text-gray-500">Assignee</button>
              <button class="px-4 py-2 text-sm text-gray-500">Created: July 1, 2023</button>
            </div>
          </div>
          <div class="hidden md:flex flex-row border-b border-gray-200">
            <button class="border border-gray-900 px-4 py-2 text-sm">Search</button>
            <button class="px-4 py-2 text-sm text-gray-500">Button</button>
            <button class="px-4 py-2 text-sm text-gray-500">Button</button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
