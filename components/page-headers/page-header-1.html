<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Header / 1 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[16px] bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[94%] flex flex-col gap-[16px]">
        <div class="hidden md:flex flex-row border-b border-gray-200">
          <button class="border border-gray-900 px-4 py-2 text-sm">Link One</button>
          <button class="px-4 py-2 text-sm text-gray-500">Tab 2</button>
          <button class="px-4 py-2 text-sm text-gray-500">Link Two</button>
          <button class="px-4 py-2 text-sm text-gray-500">Tab 4</button>
          <button class="px-4 py-2 text-sm text-gray-500">Link Three</button>
        </div>
        <div class="w-[1080px] flex flex-col md:flex-row justify-between items-end gap-[256px]">
          <div class="w-[55%] flex flex-col justify-center gap-[8px] w-full md:w-1/2">
            <h2 class="text-[32px] font-bold leading-[42px] text-[rgba(0,0,0,1.000)] text-left">Header Title</h2>
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
          </div>
          <div class="w-[42%] flex flex-col md:flex-row justify-center items-center gap-[16px] w-full md:w-1/2">
            <div class="w-[54%] flex flex-col md:flex-row items-center gap-[12px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2">
              <div class="w-[10%] overflow-hidden w-full md:w-1/2">
                <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              </div>
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Search</p>
            </div>
            <div class="flex flex-row items-center gap-[24px]">
              <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
              <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
