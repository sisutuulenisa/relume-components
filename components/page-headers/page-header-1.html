<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Header / 1 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-4 bg-white mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-lg min-h-34 flex flex-col gap-4">
        <div class="hidden md:flex flex-row border-b border-gray-200">
          <button class="border border-gray-900 px-4 py-2 text-sm">Link One</button>
          <button class="px-4 py-2 text-sm text-gray-500">Tab 2</button>
          <button class="px-4 py-2 text-sm text-gray-500">Link Two</button>
          <button class="px-4 py-2 text-sm text-gray-500">Tab 4</button>
          <button class="px-4 py-2 text-sm text-gray-500">Link Three</button>
        </div>
        <section class="w-full max-w-screen-lg flex flex-col md:flex-row justify-between items-end gap-64 overflow-hidden">
          <div class="w-[55%] flex flex-col justify-center gap-2 min-w-0 w-full md:w-1/2">
            <h2 class="text-3xl font-bold leading-snug text-black text-left">Header Title</h2>
            <p class="text-base font-normal leading-normal text-black text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
          </div>
          <div class="w-[42%] flex flex-col md:flex-row justify-center items-center gap-4 overflow-hidden min-w-0 w-full md:w-1/2">
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            <div class="flex flex-row items-center gap-6">
              <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
              <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
            </div>
          </div>
        </section>
      </div>
    </article>
  </body>
</html>
