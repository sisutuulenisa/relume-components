<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Page Header / 3 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <header class="w-full flex flex-col items-center bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px]">
      <div class="w-[1144px] h-[240px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
      <div class="w-[1144px] h-[170px] flex flex-col gap-[16px] bg-[rgba(255,255,255,1.000)]">
        <div class="w-[1080px] h-[138px] flex flex-col gap-[16px]">
          <div class="w-[257px] h-[24px] flex flex-row items-center gap-[8px]">
            <p class="text-[14px] font-[400] leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Link One</p>
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[7px] h-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]"></div>
            </div>
            <p class="text-[14px] font-[400] leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Link Two</p>
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[7px] h-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]"></div>
            </div>
            <p class="text-[14px] font-[600] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Link Three</p>
          </div>
          <div class="w-[1080px] h-[98px] flex flex-row justify-between items-end gap-[24px]">
            <div class="w-[590px] h-[98px] flex flex-col justify-center gap-[8px]">
              <h2 class="text-[32px] font-[700] leading-[42px] text-[rgba(0,0,0,1.000)] text-left">Header Title</h2>
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
            </div>
            <div class="w-[456px] h-[40px] flex flex-row justify-end items-center gap-[16px]">
              <div class="w-[248px] h-[40px] flex flex-row items-center gap-[12px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)]">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[18px] h-[18px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]"></div>
                </div>
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Search</p>
              </div>
              <div class="w-[192px] h-[40px] flex flex-row gap-[16px]">
                <button class="w-[88px] h-[40px] flex flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] border border-[rgba(0,0,0,1.000)]">
                  <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Button</p>
                </button>
                <button class="w-[88px] h-[40px] flex flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]">
                  <p class="text-[16px] font-[400] leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Button</p>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
