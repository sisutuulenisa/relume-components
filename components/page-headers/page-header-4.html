<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Page Header / 4 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[16px] bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px]">
      <div class="w-[1080px] h-[104px] flex flex-col gap-[16px]">
        <div class="w-[257px] h-[24px] flex flex-row items-center gap-[8px]">
          <p class="text-[14px] font-[400] leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Link One</p>
          <div class="w-[24px] h-[24px] overflow-hidden">
            <div class="w-[7px] h-[12px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
          </div>
          <p class="text-[14px] font-[400] leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Link Two</p>
          <div class="w-[24px] h-[24px] overflow-hidden">
            <div class="w-[7px] h-[12px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
          </div>
          <p class="text-[14px] font-[600] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Link Three</p>
        </div>
        <div class="w-[1080px] h-[64px] flex flex-row justify-between items-end gap-[24px]">
          <div class="w-[590px] h-[64px] flex flex-row items-center gap-[12px]">
            <div class="w-[64px] h-[64px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            <div class="w-[514px] h-[58px] flex flex-col">
              <h3 class="text-[24px] font-[700] leading-[34px] text-[rgba(0,0,0,1.000)] text-left">Name Surname</h3>
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">hello@relume.io</p>
            </div>
          </div>
          <div class="w-[456px] h-[40px] flex flex-row justify-end gap-[16px]">
            <div class="w-[248px] h-[40px] flex flex-row items-center gap-[12px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)]">
              <div class="w-[24px] h-[24px] overflow-hidden">
                <div class="w-[18px] h-[18px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              </div>
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Search</p>
            </div>
            <button class="w-[88px] h-[40px] flex flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] border border-[rgba(0,0,0,1.000)]">
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Button</p>
            </button>
            <button class="w-[88px] h-[40px] flex flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]">
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Button</p>
            </button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
