<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Header / 70 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full mx-auto max-w-[1440px] flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(68,68,68,1.000)] overflow-hidden">
      <div class="w-[1280px] h-[145px] flex flex-col items-center gap-[80px]">
        <div class="w-[768px] h-[145px] flex flex-col items-center gap-[24px]">
          <h1 class="text-[56px] font-[700] leading-[67px] text-[rgba(255,255,255,1.000)] text-center">Short heading here</h1>
          <p class="text-[18px] font-[400] leading-[27px] text-[rgba(255,255,255,1.000)] text-center">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
        </div>
      </div>
    </header>
  </body>
</html>
