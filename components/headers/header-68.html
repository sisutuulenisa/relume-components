<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Header / 68 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
    <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 bg-neutral-700 overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-75 flex flex-col items-center gap-20">
        <div class="w-full max-w-screen-md min-h-75 flex flex-col items-center gap-8">
          <div class="w-full max-w-screen-md flex flex-col items-center gap-4">
            <div class="flex flex-col md:flex-row items-center overflow-hidden">
              <p class="text-base font-semibold leading-normal text-white text-center">Tagline</p>
            </div>
            <div class="w-full max-w-screen-md flex flex-col items-center gap-6">
              <h2 class="text-6xl font-bold leading-tight text-white text-center">Short heading here</h2>
              <p class="text-lg font-normal leading-normal text-white text-center">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
            </div>
          </div>
          <div class="w-2/3 min-h-20 flex flex-col gap-4">
            <div class="w-full max-w-md flex flex-col md:flex-row gap-4">
              <input type="email" placeholder="Enter your email" class="w-full px-3 py-3 text-base text-white bg-transparent border border-white rounded-md placeholder:text-white/70 focus:outline-none focus:ring-2 focus:ring-white/40" />
              <button class="inline-flex items-center justify-center px-6 py-3 border border-white bg-white text-black rounded-md text-base font-medium whitespace-nowrap">
                <p class="text-base font-normal leading-normal text-black text-left">Sign up</p>
              </button>
            </div>
            <p class="text-xs font-normal leading-normal text-white text-center">By clicking Sign Up you&#x27;re confirming that you agree with our Terms and Conditions.</p>
          </div>
        </div>
      </div>
    </article>
      <script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
