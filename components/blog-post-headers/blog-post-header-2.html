<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog Post Header / 2 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 px-16 py-28 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-96 flex flex-col gap-20">
        <div class="w-full max-w-screen-xl min-h-44 flex flex-col gap-12">
          <button class="w-1/12 flex flex-col md:flex-row justify-center items-center gap-2 overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
            <p class="text-base font-normal leading-normal text-black text-left">All Posts</p>
          </button>
          <div class="w-full max-w-screen-xl flex flex-col gap-4 overflow-hidden">
            <div class="w-[14%] flex flex-col md:flex-row items-center gap-4 overflow-hidden">
              <div class="w-2/5 flex flex-col md:flex-row px-2 py-1 bg-neutral-200 overflow-hidden min-w-0 w-full md:w-1/2">
                <p class="text-sm font-semibold leading-normal text-black text-left">Category</p>
              </div>
              <p class="text-sm font-semibold leading-normal text-black text-left">5 min read</p>
            </div>
            <h2 class="text-5xl font-bold leading-tight text-black text-left">Blog title heading will go here</h2>
          </div>
        </div>
        <div class="w-full max-w-screen-xl min-h-96 flex flex-col gap-8">
          <figure class="w-96 h-96 bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></figure>
          <div class="w-full max-w-screen-xl flex flex-col md:flex-row justify-between gap-99 overflow-hidden">
            <div class="w-[19%] flex flex-col md:flex-row gap-12 overflow-hidden min-w-0 w-full md:w-1/2">
              <div class="w-[30%] flex flex-col gap-2 min-w-0 w-full md:w-1/2">
                <p class="text-base font-normal leading-normal text-black text-left">Written by</p>
                <p class="text-base font-medium leading-normal text-black text-left">Full Name</p>
              </div>
              <div class="w-1/2 flex flex-col gap-2 min-w-0 w-full md:w-1/2">
                <p class="text-base font-normal leading-normal text-black text-left">Published on</p>
                <p class="text-base font-medium leading-normal text-black text-left">22 January 2021</p>
              </div>
            </div>
            <div class="flex flex-row items-center gap-6">
              <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
              <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
              <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
              <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
            </div>
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
