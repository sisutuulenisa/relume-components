<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Blog Post Header / 2 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[943px] flex flex-col gap-[80px]">
        <div class="w-[1280px] h-[175px] flex flex-col gap-[48px]">
          <button class="w-[96px] h-[24px] flex flex-row justify-center items-center gap-[8px]">
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[7px] h-[12px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            </div>
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">All Posts</p>
          </button>
          <div class="w-[1280px] h-[103px] flex flex-col gap-[16px] overflow-hidden">
            <div class="w-[181px] h-[29px] flex flex-row items-center gap-[16px]">
              <div class="w-[73px] h-[29px] flex flex-row px-[8px] py-[4px] bg-[rgba(238,238,238,1.000)]">
                <p class="text-[14px] font-[600] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Category</p>
              </div>
              <p class="text-[14px] font-[600] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">5 min read</p>
            </div>
            <h1 class="text-[48px] font-[700] leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Blog title heading will go here</h1>
          </div>
        </div>
        <div class="w-[1280px] h-[688px] flex flex-col gap-[32px]">
          <div class="w-[1280px] h-[600px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
          <div class="w-[1280px] h-[56px] flex flex-row justify-between gap-[397px]">
            <div class="w-[242px] h-[56px] flex flex-row gap-[48px]">
              <div class="w-[73px] h-[56px] flex flex-col gap-[8px]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Written by</p>
                <p class="text-[16px] font-[500] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Full Name</p>
              </div>
              <div class="w-[121px] h-[56px] flex flex-col gap-[8px]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Published on</p>
                <p class="text-[16px] font-[500] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">22 January 2021</p>
              </div>
            </div>
            <div class="w-[152px] h-[32px] flex flex-row gap-[8px]">
              <div class="w-[32px] h-[32px] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden">
                <div class="w-[24px] h-[24px]">
                  <div class="w-[20px] h-[10px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
                </div>
              </div>
              <div class="w-[32px] h-[32px] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[18px] h-[18px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
                </div>
              </div>
              <div class="w-[32px] h-[32px] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[18px] h-[16px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
                </div>
              </div>
              <div class="w-[32px] h-[32px] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[20px] h-[20px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
