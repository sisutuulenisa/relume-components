<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog Post Header / 2 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] flex flex-col gap-[80px]">
        <div class="w-[1280px] flex flex-col gap-[48px]">
          <button class="w-[8%] flex flex-col md:flex-row justify-center items-center gap-[8px] bg-gray-900 text-white px-[16px] py-[10px] rounded-[8px] cursor-pointer">
            <div class="w-[25%] overflow-hidden w-full md:w-1/2">
              <div class="w-[7px] h-[12px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">All Posts</p>
          </button>
          <div class="w-[1280px] flex flex-col gap-[16px] overflow-hidden">
            <div class="w-[14%] flex flex-col md:flex-row items-center gap-[16px]">
              <div class="w-[40%] flex flex-col md:flex-row px-[8px] py-[4px] bg-[rgba(238,238,238,1.000)] w-full md:w-1/2">
                <p class="text-[14px] font-semibold leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Category</p>
              </div>
              <p class="text-[14px] font-semibold leading-[21px] text-[rgba(0,0,0,1.000)] text-left">5 min read</p>
            </div>
            <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Blog title heading will go here</h1>
          </div>
        </div>
        <div class="w-[1280px] flex flex-col gap-[32px]">
          <div class="w-[1280px] h-[600px] bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
          <div class="w-[1280px] flex flex-col md:flex-row justify-between gap-[397px]">
            <div class="w-[19%] flex flex-col md:flex-row gap-[48px] w-full md:w-1/2">
              <div class="w-[30%] flex flex-col gap-[8px] w-full md:w-1/2">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Written by</p>
                <p class="text-[16px] font-medium leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Full Name</p>
              </div>
              <div class="w-[50%] flex flex-col gap-[8px] w-full md:w-1/2">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Published on</p>
                <p class="text-[16px] font-medium leading-[24px] text-[rgba(0,0,0,1.000)] text-left">22 January 2021</p>
              </div>
            </div>
            <div class="w-[12%] flex flex-col md:flex-row gap-[8px] w-full md:w-1/2">
              <div class="w-[21%] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden w-full md:w-1/2">
                <div class="w-[75%]">
                  <div class="w-[20px] h-[10px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
              </div>
              <div class="w-[21%] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden w-full md:w-1/2">
                <div class="w-[75%] overflow-hidden">
                  <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
              </div>
              <div class="w-[21%] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden w-full md:w-1/2">
                <div class="w-[75%] overflow-hidden">
                  <div class="w-[18px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
              </div>
              <div class="w-[21%] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden w-full md:w-1/2">
                <div class="w-[75%] overflow-hidden">
                  <div class="w-[20px] h-[20px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
