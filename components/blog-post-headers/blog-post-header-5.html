<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Blog Post Header / 5 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[266px] flex flex-col items-center gap-[80px]">
        <div class="w-[768px] h-[266px] flex flex-col items-center gap-[48px]">
          <div class="w-[768px] h-[98px] flex flex-col items-center gap-[16px]">
            <div class="w-[768px] h-[24px] flex flex-row justify-center items-center">
              <p class="text-[16px] font-[600] leading-[24px] text-[rgba(255,255,255,1.000)] text-center">Category</p>
            </div>
            <h1 class="text-[48px] font-[700] leading-[58px] text-[rgba(255,255,255,1.000)] text-center">Blog title heading will go here</h1>
          </div>
          <div class="w-[167px] h-[120px] flex flex-col items-center gap-[16px]">
            <div class="w-[56px] h-[56px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            <div class="w-[167px] h-[48px] flex flex-col items-center">
              <p class="text-[14px] font-[600] leading-[21px] text-[rgba(255,255,255,1.000)] text-left">Full name</p>
              <div class="w-[167px] h-[27px] flex flex-row items-center gap-[8px]">
                <p class="text-[14px] font-[400] leading-[21px] text-[rgba(255,255,255,1.000)] text-left">11 Jan 2022</p>
                <p class="text-[18px] font-[400] leading-[27px] text-[rgba(255,255,255,1.000)] text-left">•</p>
                <p class="text-[14px] font-[400] leading-[21px] text-[rgba(255,255,255,1.000)] text-left">5 min read</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
