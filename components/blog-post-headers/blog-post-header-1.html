<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Blog Post Header / 1 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[890px] flex flex-col items-center gap-[80px]">
        <div class="w-[768px] h-[210px] flex flex-col gap-[48px]">
          <div class="w-[768px] h-[106px] flex flex-col gap-[24px] overflow-hidden">
            <div class="w-[129px] h-[24px] flex flex-row items-center gap-[8px]">
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Blog</p>
              <div class="w-[16px] h-[16px] overflow-hidden">
                <div class="w-[4px] h-[8px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              </div>
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Category</p>
            </div>
            <h1 class="text-[48px] font-[700] leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Blog title heading will go here</h1>
          </div>
          <div class="w-[768px] h-[56px] flex flex-row justify-between items-center gap-[14px]">
            <div class="w-[239px] h-[56px] flex flex-row items-center gap-[16px]">
              <div class="w-[56px] h-[56px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              <div class="w-[167px] h-[52px] flex flex-col gap-[4px]">
                <p class="text-[14px] font-[600] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Full name</p>
                <div class="w-[167px] h-[27px] flex flex-row items-center gap-[8px]">
                  <p class="text-[14px] font-[400] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">11 Jan 2022</p>
                  <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-left">•</p>
                  <p class="text-[14px] font-[400] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">5 min read</p>
                </div>
              </div>
            </div>
            <div class="w-[152px] h-[32px] flex flex-row gap-[8px]">
              <div class="w-[32px] h-[32px] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden">
                <div class="w-[24px] h-[24px]">
                  <div class="w-[20px] h-[10px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
                </div>
              </div>
              <div class="w-[32px] h-[32px] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[18px] h-[18px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
                </div>
              </div>
              <div class="w-[32px] h-[32px] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[18px] h-[16px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
                </div>
              </div>
              <div class="w-[32px] h-[32px] flex flex-col justify-center items-center p-[4px] rounded-[64px] bg-[rgba(255,255,255,1.000)] overflow-hidden">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[20px] h-[20px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="w-[1280px] h-[600px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
      </div>
    </header>
  </body>
</html>
