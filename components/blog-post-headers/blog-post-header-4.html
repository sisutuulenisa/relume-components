<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog Post Header / 4 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
      <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-96 flex flex-col gap-20">
        <div class="w-full max-w-screen-xl flex flex-col md:flex-row gap-20 overflow-hidden">
          <div class="w-1/3 min-h-70 flex flex-col gap-8 min-w-0 w-full md:w-1/2">
            <button class="flex flex-col md:flex-row justify-center items-center gap-2 overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
              <p class="text-base font-normal leading-normal text-black text-left">All Posts</p>
            </button>
            <div class="w-96 flex flex-col gap-6">
              <div class="flex flex-col md:flex-row items-center gap-4 overflow-hidden">
                <div class="w-1/2 flex flex-col md:flex-row px-2 py-1 bg-neutral-200 overflow-hidden min-w-0 w-full md:w-1/2">
                  <p class="text-sm font-semibold leading-normal text-black text-left">Category</p>
                </div>
                <p class="text-sm font-semibold leading-normal text-black text-left">5 min read</p>
              </div>
              <h2 class="text-5xl font-bold leading-tight text-black text-left">Blog title heading will go here</h2>
            </div>
            <div class="w-96 flex flex-col md:flex-row gap-1 overflow-hidden">
              <p class="text-sm font-normal leading-normal text-black text-left">Published on</p>
              <p class="text-sm font-normal leading-normal text-black text-left">11 Jan 2022</p>
            </div>
          </div>
          <figure class="w-full md:w-1/2 overflow-hidden bg-gray-100 rounded-lg flex items-center justify-center h-60" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></figure>
        </div>
      </div>
    </article>
      <script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
