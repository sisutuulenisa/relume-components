<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Blog Post Header / 4 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[450px] flex flex-col gap-[80px]">
        <div class="w-[1280px] h-[450px] flex flex-row gap-[80px]">
          <div class="w-[420px] h-[282px] flex flex-col gap-[32px]">
            <button class="w-[96px] h-[24px] flex flex-row justify-center items-center gap-[8px]">
              <div class="w-[24px] h-[24px] overflow-hidden">
                <div class="w-[7px] h-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]"></div>
              </div>
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">All Posts</p>
            </button>
            <div class="w-[420px] h-[169px] flex flex-col gap-[24px]">
              <div class="w-[156px] h-[29px] flex flex-row items-center gap-[16px]">
                <div class="w-[73px] h-[29px] flex flex-row px-[8px] py-[4px] bg-[rgba(238,238,238,1.000)]">
                  <p class="text-[14px] font-[600] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Category</p>
                </div>
                <p class="text-[14px] font-[600] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">5 min read</p>
              </div>
              <h1 class="text-[48px] font-[700] leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Blog title heading will go here</h1>
            </div>
            <div class="w-[420px] h-[25px] flex flex-row gap-[4px]">
              <p class="text-[14px] font-[400] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Published on</p>
              <p class="text-[14px] font-[400] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">11 Jan 2022</p>
            </div>
          </div>
          <div class="w-[780px] h-[450px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
        </div>
      </div>
    </header>
  </body>
</html>
