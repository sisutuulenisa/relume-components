<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog Post Header / 3 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] min-h-[450px] flex flex-col gap-[80px]">
        <div class="w-[1280px] flex flex-col md:flex-row gap-[80px] overflow-hidden">
          <div class="w-[33%] min-h-[450px] flex flex-col justify-between gap-[48px] min-w-0 w-full md:w-1/2">
            <div class="w-[420px] flex flex-col gap-[32px]">
              <div class="w-[31%] flex flex-col md:flex-row items-center gap-[8px] overflow-hidden">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Blog</p>
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Category</p>
              </div>
              <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Blog title heading will go here</h1>
            </div>
            <div class="w-[420px] min-h-[155px] flex flex-col gap-[32px]">
              <div class="w-[420px] flex flex-col">
                <div class="w-[22%] flex flex-col md:flex-row gap-[4px] overflow-hidden">
                  <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">By</p>
                  <p class="text-[16px] font-semibold leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Full name</p>
                </div>
                <div class="hidden md:flex flex-row border-b border-gray-200">
                  <button class="border border-gray-900 px-4 py-2 text-sm">11 Jan 2022</button>
                  <button class="px-4 py-2 text-sm text-gray-500">•</button>
                  <button class="px-4 py-2 text-sm text-gray-500">5 min read</button>
                </div>
              </div>
              <div class="w-[36%] min-h-[72px] flex flex-col gap-[16px]">
                <p class="text-[16px] font-semibold leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Share this post</p>
                <div class="flex flex-row items-center gap-[24px]">
                  <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
                  <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
                </div>
              </div>
            </div>
          </div>
          <div class="w-full md:w-1/2 overflow-hidden bg-gray-100 rounded-lg flex items-center justify-center h-[240px]" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
        </div>
      </div>
    </header>
  </body>
</html>
