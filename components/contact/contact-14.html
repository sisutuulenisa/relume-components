<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Contact / 14 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <section class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[745px] flex flex-col gap-[80px]">
        <div class="w-[768px] h-[149px] flex flex-col gap-[16px]">
          <div class="w-[53px] h-[24px] flex flex-row items-center">
            <p class="text-[16px] font-[600] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Tagline</p>
          </div>
          <div class="w-[768px] h-[109px] flex flex-col gap-[24px]">
            <h1 class="text-[48px] font-[700] leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Contact us</h1>
            <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
          </div>
        </div>
        <div class="w-[1280px] h-[516px] flex flex-row gap-[80px]">
          <div class="w-[400px] h-[508px] flex flex-col gap-[40px]">
            <div class="w-[400px] h-[140px] flex flex-col gap-[16px]">
              <div class="w-[32px] h-[32px] overflow-hidden">
                <div class="w-[27px] h-[22px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              </div>
              <div class="w-[400px] h-[92px] flex flex-col gap-[8px]">
                <h4 class="text-[20px] font-[700] leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Email</h4>
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet.</p>
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left underline">email@example.com</p>
              </div>
            </div>
            <div class="w-[400px] h-[140px] flex flex-col gap-[16px]">
              <div class="w-[32px] h-[32px] overflow-hidden">
                <div class="w-[24px] h-[24px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              </div>
              <div class="w-[400px] h-[92px] flex flex-col gap-[8px]">
                <h4 class="text-[20px] font-[700] leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Phone</h4>
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet.</p>
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left underline">+1 (555) 000-0000</p>
              </div>
            </div>
            <div class="w-[400px] h-[148px] flex flex-col gap-[16px]">
              <div class="w-[32px] h-[32px] overflow-hidden">
                <div class="w-[22px] h-[26px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              </div>
              <div class="w-[400px] h-[100px] flex flex-col gap-[16px]">
                <div class="w-[400px] h-[60px] flex flex-col gap-[8px]">
                  <h4 class="text-[20px] font-[700] leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Office</h4>
                  <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">123 Sample St, Sydney NSW 2000 AU</p>
                </div>
                <div class="w-[133px] h-[24px] flex flex-col gap-[16px]">
                  <button class="w-[133px] h-[24px] flex flex-row justify-center items-center gap-[8px]">
                    <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Get Directions</p>
                    <div class="w-[24px] h-[24px] overflow-hidden">
                      <div class="w-[7px] h-[12px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
                    </div>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="w-[800px] h-[516px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
        </div>
      </div>
    </section>
  </body>
</html>
