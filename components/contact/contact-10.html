<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact / 10 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] flex flex-col gap-[80px]">
        <div class="w-[1280px] flex flex-col md:flex-row gap-[80px]">
          <div class="w-[47%] h-[734px] w-full md:w-[47%] bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
          <div class="w-[47%] flex flex-col gap-[32px] w-full md:w-1/2">
            <div class="w-[600px] flex flex-col gap-[16px]">
              <div class="w-[9%] flex flex-col md:flex-row items-center">
                <p class="text-[16px] font-semibold leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Tagline</p>
              </div>
              <div class="w-[600px] flex flex-col gap-[24px]">
                <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Contact us</h1>
                <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
              </div>
            </div>
            <div class="w-[600px] flex flex-col gap-[24px]">
              <div class="w-[600px] flex flex-col gap-[8px]">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Name</p>
                <div class="w-[600px] h-[48px] flex flex-col md:flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]"></div>
              </div>
              <div class="w-[600px] flex flex-col gap-[8px]">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Email</p>
                <div class="w-[600px] h-[48px] flex flex-col md:flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]"></div>
              </div>
              <div class="w-[600px] flex flex-col gap-[8px]">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Message</p>
                <div class="w-[600px] flex flex-col md:flex-row p-[12px] border border-[rgba(0,0,0,1.000)]">
                  <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Type your message...</p>
                  <div class="w-[2px] h-[2px] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2"></div>
                  <div class="w-[1%] h-[6px] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2"></div>
                </div>
              </div>
              <div class="w-[24%] flex flex-col md:flex-row items-center gap-[8px]">
                <div class="w-[13%] h-[18px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden w-full md:w-1/2"></div>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">I accept the Terms</p>
              </div>
              <button class="w-[16%] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)] cursor-pointer">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Submit</p>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
