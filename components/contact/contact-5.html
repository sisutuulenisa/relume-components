<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact / 5 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 px-16 py-28 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-96 flex flex-col gap-20">
        <div class="w-full max-w-screen-xl flex flex-col md:flex-row gap-20 overflow-hidden">
          <div class="w-1/2 flex flex-col gap-8 min-w-0 w-full md:w-1/2">
            <div class="w-96 flex flex-col gap-4">
              <div class="w-1/12 flex flex-col md:flex-row items-center overflow-hidden">
                <p class="text-base font-semibold leading-normal text-black text-left">Tagline</p>
              </div>
              <div class="w-96 flex flex-col gap-6">
                <h2 class="text-5xl font-bold leading-tight text-black text-left">Contact us</h2>
                <p class="text-lg font-normal leading-normal text-black text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
              </div>
            </div>
            <div class="w-[51%] flex flex-col gap-4">
              <div class="w-[62%] flex flex-col md:flex-row gap-4 overflow-hidden">
                <div class="w-[13%] overflow-hidden min-w-0 w-full md:w-1/2">
                  <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                </div>
                <p class="text-base font-normal leading-normal text-black text-left">email@example.com</p>
              </div>
              <div class="w-[56%] flex flex-col md:flex-row gap-4 overflow-hidden">
                <div class="w-[14%] overflow-hidden min-w-0 w-full md:w-1/2">
                  <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                </div>
                <p class="text-base font-normal leading-normal text-black text-left">+1 (555) 000-0000</p>
              </div>
              <div class="w-76 flex flex-col md:flex-row gap-4 overflow-hidden">
                <div class="w-1/12 overflow-hidden min-w-0 w-full md:w-1/2">
                  <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                </div>
                <p class="text-base font-normal leading-normal text-black text-left">123 Sample St, Sydney NSW 2000 AU</p>
              </div>
            </div>
          </div>
          <div class="w-1/2 min-h-96 flex flex-col gap-6 min-w-0 w-full md:w-1/2">
            <div class="w-96 flex flex-col gap-2">
              <p class="text-base font-normal leading-normal text-black text-left">Name</p>
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </div>
            <div class="w-96 flex flex-col gap-2">
              <p class="text-base font-normal leading-normal text-black text-left">Email</p>
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </div>
            <div class="w-96 flex flex-col gap-2">
              <p class="text-base font-normal leading-normal text-black text-left">Message</p>
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </div>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
            <button class="w-1/6 flex flex-col md:flex-row justify-center items-center gap-2 px-6 py-3 bg-black border border-black overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
              <p class="text-base font-normal leading-normal text-white text-left">Submit</p>
            </button>
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
