<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact / 16 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] flex flex-col gap-[80px]">
        <div class="w-[1280px] flex flex-col md:flex-row gap-[80px]">
          <div class="w-[55%] flex flex-col gap-[16px] w-full md:w-1/2">
            <div class="w-[8%] flex flex-col md:flex-row items-center">
              <p class="text-[16px] font-semibold leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Tagline</p>
            </div>
            <div class="w-[700px] flex flex-col gap-[24px]">
              <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Contact us</h1>
              <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
            </div>
          </div>
          <div class="w-[39%] flex flex-col gap-[24px] w-full md:w-1/2">
            <div class="w-[500px] flex flex-col md:flex-row gap-[16px]">
              <div class="w-[5%] overflow-hidden w-full md:w-1/2">
                <div class="w-[20px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              </div>
              <div class="w-[92%] flex flex-col gap-[8px] w-full md:w-1/2">
                <h4 class="text-[20px] font-bold leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Email</h4>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left underline">email@example.com</p>
              </div>
            </div>
            <div class="w-[500px] flex flex-col md:flex-row gap-[16px]">
              <div class="w-[5%] overflow-hidden w-full md:w-1/2">
                <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              </div>
              <div class="w-[92%] flex flex-col gap-[8px] w-full md:w-1/2">
                <h4 class="text-[20px] font-bold leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Phone</h4>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left underline">+1 (555) 000-0000</p>
              </div>
            </div>
            <div class="w-[500px] flex flex-col md:flex-row gap-[16px]">
              <div class="w-[5%] overflow-hidden w-full md:w-1/2">
                <div class="w-[16px] h-[20px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              </div>
              <div class="w-[92%] flex flex-col gap-[8px] w-full md:w-1/2">
                <h4 class="text-[20px] font-bold leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Office</h4>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">123 Sample St, Sydney NSW 2000 AU</p>
              </div>
            </div>
          </div>
        </div>
        <div class="w-[1280px] h-[720px] bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
      </div>
    </section>
  </body>
</html>
