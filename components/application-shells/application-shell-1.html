<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Application Shell / 1 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col md:flex-row bg-neutral-200 overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl flex flex-col min-w-0 md:w-1/2">
        <div class="w-full max-w-screen-xl flex flex-col items-center bg-white border border-[rgba(0,0,0,1.000)] overflow-hidden">
          <div class="w-full max-w-screen-xl flex flex-col md:flex-row justify-between items-center overflow-hidden">
            <div class="w-[37%] flex flex-col md:flex-row items-center gap-6 overflow-hidden min-w-0 w-full md:w-1/2">
              <div class="w-1/6 overflow-hidden min-w-0 w-full md:w-1/2">
                <div class="w-5/6 flex flex-col md:flex-row overflow-hidden">
                  <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                  <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                  <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                  <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                  <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                </div>
              </div>
              <div class="hidden md:flex flex-row border-b border-gray-200">
                <button class="border border-gray-900 px-4 py-2 text-sm">Link One</button>
                <button class="px-4 py-2 text-sm text-gray-500">Link Two</button>
                <button class="px-4 py-2 text-sm text-gray-500">Link Three</button>
                <button class="px-4 py-2 text-sm text-gray-500">Link Four</button>
              </div>
            </div>
            <div class="w-1/4 flex flex-col md:flex-row justify-center items-center gap-4 overflow-hidden min-w-0 w-full md:w-1/2">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              <nav class="w-[11%] flex flex-col md:flex-row items-center gap-1 p-2 overflow-hidden min-w-0 w-full md:w-1/2">
                <div class="w-3/5 overflow-hidden min-w-0 w-full md:w-1/2">
                  <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                </div>
              </nav>
              <figure class="w-full md:w-1/2 overflow-hidden bg-gray-100 rounded-lg flex items-center justify-center h-60" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></figure>
            </div>
          </div>
        </div>
        <div class="w-full max-w-screen-xl flex flex-col justify-center items-center border border-[rgba(204,204,204,1.000)] overflow-hidden">
          <p class="text-base font-normal leading-normal text-[rgba(0,0,0,0.500)] text-center">Click and paste Page Header</p>
        </div>
        <div class="w-full max-w-screen-xl flex flex-col gap-12 px-8 py-12 overflow-hidden">
          <div class="w-full max-w-screen-xl flex flex-col items-center gap-12 border border-[rgba(204,204,204,1.000)]">
            <p class="text-base font-normal leading-normal text-[rgba(0,0,0,0.500)] text-center">Click and paste Main Content</p>
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
