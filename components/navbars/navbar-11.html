<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navbar / 11 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <nav class="w-full flex flex-col items-center bg-white border-b border-gray-200">
      <div class="w-full max-w-screen-xl mx-auto px-5 md:px-20 py-4 flex flex-row justify-between items-center gap-6">
        <!-- Logo -->
        <div class="flex items-center gap-2 flex-shrink-0">
          <div class="w-8 h-8 bg-gray-900 rounded flex items-center justify-center">
            <i data-lucide="circle" class="w-5 h-5 text-white"></i>
          </div>
          <span class="text-base font-semibold text-gray-900">Company</span>
        </div>
        <!-- Nav links -->
        <div class="hidden md:flex flex-row items-center gap-6">
          <a href="#" class="text-sm font-medium text-gray-900">Link One</a>
          <a href="#" class="text-sm text-gray-500 hover:text-gray-900">Link Two</a>
          <a href="#" class="text-sm text-gray-500 hover:text-gray-900">Link Three</a>
          <a href="#" class="text-sm text-gray-500 hover:text-gray-900">Link Four</a>
        </div>
        <!-- CTA buttons -->
        <div class="flex flex-row items-center gap-3">
          <button class="inline-flex items-center gap-2 px-5 py-2.5 border border-gray-900 text-gray-900 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">Log in</button>
          <button class="inline-flex items-center gap-2 px-5 py-2.5 bg-black text-white rounded-lg text-sm font-medium hover:bg-gray-800 transition-colors">Sign up</button>
        </div>
      </div>
    </nav>
      <script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
