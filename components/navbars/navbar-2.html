<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Navbar / 2 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <nav class="w-full flex flex-col justify-center items-center bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px]">
      <div class="w-[1312px] h-[40px] flex flex-row justify-center items-center gap-[32px]">
        <div class="w-[429px] h-[36px] flex flex-row">
          <div class="w-[84px] h-[36px] overflow-hidden">
            <div class="w-[70px] h-[36px] overflow-hidden">
              <div class="w-[19px] h-[16px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              <div class="w-[19px] h-[25px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              <div class="w-[19px] h-[16px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              <div class="w-[22px] h-[16px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              <div class="w-[15px] h-[9px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            </div>
          </div>
        </div>
        <div class="w-[390px] h-[24px] flex flex-row items-center gap-[32px]">
          <div class="w-[62px] h-[24px] flex flex-row justify-center items-center gap-[4px]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Link One</p>
          </div>
          <div class="w-[64px] h-[24px] flex flex-row justify-center items-center gap-[4px]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Link Two</p>
          </div>
          <div class="w-[74px] h-[24px] flex flex-row justify-center items-center gap-[4px]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Link Three</p>
          </div>
          <div class="w-[94px] h-[24px] flex flex-col gap-[8px]">
            <div class="w-[94px] h-[24px] flex flex-row justify-center items-center gap-[4px]">
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Link Four</p>
              <div class="w-[24px] h-[24px] overflow-hidden">
                <div class="w-[13px] h-[7px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              </div>
            </div>
            <div class="w-[125px] h-[152px] flex flex-col gap-[16px] p-[24px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden">
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Link Five</p>
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Link Six</p>
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Link Seven</p>
            </div>
          </div>
        </div>
        <div class="w-[429px] h-[40px] flex flex-row justify-end items-center gap-[16px]">
          <button class="w-[88px] h-[40px] flex flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Button</p>
          </button>
        </div>
      </div>
    </nav>
  </body>
</html>
