<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navbar / 2 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <nav class="w-full flex flex-col justify-center items-center bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[91%] flex flex-col md:flex-row justify-center items-center gap-[32px]">
        <div class="w-[33%] flex flex-col md:flex-row w-full md:w-1/2">
          <div class="w-[20%] overflow-hidden w-full md:w-1/2">
            <div class="w-[83%] flex flex-col md:flex-row overflow-hidden">
              <div class="w-[19px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[19px] h-[25px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[19px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[22px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[15px] h-[9px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
          </div>
        </div>
        <div class="hidden md:flex flex-row border-b border-gray-200">
          <button class="border border-gray-900 px-4 py-2 text-sm">Link One</button>
          <button class="px-4 py-2 text-sm text-gray-500">Link Two</button>
          <button class="px-4 py-2 text-sm text-gray-500">Link Three</button>
          <button class="px-4 py-2 text-sm text-gray-500">Link Four</button>
        </div>
        <div class="w-[33%] flex flex-col md:flex-row justify-end items-center gap-[16px] w-full md:w-1/2">
          <button class="w-[21%] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2 cursor-pointer">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Button</p>
          </button>
        </div>
      </div>
    </nav>
  </body>
</html>
