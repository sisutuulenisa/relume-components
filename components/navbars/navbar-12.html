<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Navbar / 12 /</title>
<link href="../../dist/tailwind.css" rel="stylesheet"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-white text-gray-900 antialiased font-sans">
<nav class="w-full flex flex-col items-center bg-white mx-auto max-w-screen-xl px-5 md:px-20">
<div class="w-full max-w-screen-xl flex flex-col md:flex-row justify-between items-center overflow-hidden">
<div class="w-full max-w-screen-xl flex flex-col md:flex-row justify-between items-center gap-158 overflow-hidden min-w-0 md:w-1/2">
<div class="flex flex-col md:flex-row items-center gap-6 overflow-hidden min-w-0 w-full md:w-1/2">
<div class="w-21 overflow-hidden min-w-0 w-full md:w-1/2">
<div class="w-5/6 flex flex-col md:flex-row overflow-hidden">
<i class="w-5 h-5 flex-shrink-0" data-lucide="facebook"></i>
<i class="w-5 h-5 flex-shrink-0" data-lucide="twitter"></i>
<i class="w-5 h-5 flex-shrink-0" data-lucide="instagram"></i>
<i class="w-5 h-5 flex-shrink-0" data-lucide="linkedin"></i>
<i class="w-5 h-5 flex-shrink-0" data-lucide="youtube"></i>
</div>
</div>
</div>
<div class="flex flex-col md:flex-row justify-center items-center gap-4 overflow-hidden min-w-0 w-full md:w-1/2">
<div class="hidden md:flex flex-row border-b border-gray-200">
<button class="border border-gray-900 px-4 py-2 text-sm">Link One</button>
<button class="px-4 py-2 text-sm text-gray-500">Link Two</button>
<button class="px-4 py-2 text-sm text-gray-500">Link Three</button>
<button class="px-4 py-2 text-sm text-gray-500">Link Four</button>
</div>
<div class="flex flex-row items-center gap-6">
<button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
<button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
</div>
</div>
</div>
</div>
</nav>
<script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
