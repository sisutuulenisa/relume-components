<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navbar / 15 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
      <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <nav class="w-full flex flex-col justify-end items-center mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="min-h-18 flex flex-col justify-center items-center bg-white border border-black">
        <div class="w-11/12 flex flex-col md:flex-row justify-center items-center gap-8 overflow-hidden">
          <div class="flex flex-col md:flex-row gap-1 overflow-hidden min-w-0 w-full md:w-1/2">
            <button class="w-6 flex flex-col md:flex-row justify-center items-center gap-1 overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg cursor-pointer">
              <div class="w-full overflow-hidden min-w-0 md:w-1/2">
                <i data-lucide="circle" class="w-5 h-5 flex-shrink-0"></i>
              </div>
            </button>
          </div>
          <div class="hidden md:flex flex-row border-b border-gray-200">
            <button class="border border-gray-900 px-4 py-2 text-sm">Link One</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Two</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Three</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Four</button>
          </div>
          <button class="w-1/6 flex flex-col md:flex-row justify-center items-center gap-2 px-5 py-2 bg-black border border-black overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg cursor-pointer">
            <p class="text-base font-normal leading-normal text-white text-left">Button</p>
          </button>
        </div>
      </div>
    </nav>
      <script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
