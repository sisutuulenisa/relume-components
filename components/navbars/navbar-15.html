<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navbar / 15 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <nav class="w-full flex flex-col justify-end items-center mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[44%] flex flex-col justify-center items-center bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)]">
        <div class="w-[90%] flex flex-col md:flex-row justify-center items-center gap-[32px]">
          <div class="w-[4%] flex flex-col md:flex-row gap-[4px] w-full md:w-1/2">
            <div class="w-[24px] flex flex-col md:flex-row justify-center items-center gap-[4px] w-full md:w-1/2">
              <div class="w-[24px] overflow-hidden w-full md:w-1/2">
                <div class="w-[16px] h-[9px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              </div>
            </div>
          </div>
          <div class="hidden md:flex flex-row border-b border-gray-200">
            <button class="border border-gray-900 px-4 py-2 text-sm">Link One</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Two</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Three</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Four</button>
          </div>
          <button class="w-[16%] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2 cursor-pointer">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Button</p>
          </button>
        </div>
      </div>
    </nav>
  </body>
</html>
