<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navbar / 15 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <nav class="w-full flex flex-col justify-end items-center mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[44%] min-h-[72px] flex flex-col justify-center items-center bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)]">
        <div class="w-[90%] flex flex-col md:flex-row justify-center items-center gap-[32px] overflow-hidden">
          <div class="w-[4%] flex flex-col md:flex-row gap-[4px] overflow-hidden min-w-0 w-full md:w-1/2">
            <button class="w-[24px] flex flex-col md:flex-row justify-center items-center gap-[4px] overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] cursor-pointer">
              <div class="w-[24px] overflow-hidden min-w-0 w-full md:w-1/2">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              </div>
            </button>
          </div>
          <div class="hidden md:flex flex-row border-b border-gray-200">
            <button class="border border-gray-900 px-4 py-2 text-sm">Link One</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Two</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Three</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Four</button>
          </div>
          <button class="w-[16%] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] cursor-pointer">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Button</p>
          </button>
        </div>
      </div>
    </nav>
  </body>
</html>
