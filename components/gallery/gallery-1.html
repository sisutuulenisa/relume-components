<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery / 1 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full max-w-screen-xl mx-auto px-5 md:px-20 ">
      <!-- Header -->
      <div class="w-full flex flex-col items-center gap-6 mb-16">
        <h2 class="text-4xl md:text-5xl font-bold leading-tight text-black text-center">Image Gallery</h2>
        <p class="text-lg font-normal leading-normal text-black text-center max-w-2xl">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
      </div>
      <!-- Gallery grid -->
      <div class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="w-full aspect-video bg-gray-200 rounded"></div>
        <div class="w-full aspect-video bg-gray-200 rounded"></div>
        <div class="w-full aspect-video bg-gray-200 rounded"></div>
        <div class="w-full aspect-video bg-gray-200 rounded"></div>
        <div class="w-full aspect-video bg-gray-200 rounded"></div>
        <div class="w-full aspect-video bg-gray-200 rounded"></div>
      </div>
      <!-- Load more -->
      <div class="flex justify-center mt-12">
        <button class="inline-flex items-center gap-2 px-6 py-3 bg-black text-white rounded-lg text-sm font-semibold hover:bg-gray-800 transition-colors">Load more</button>
      </div>
    </article>
      <script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
