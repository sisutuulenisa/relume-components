<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Topbar / 1 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[1440px] flex flex-col md:flex-row justify-between items-center overflow-hidden">
        <div class="w-[37%] flex flex-col md:flex-row items-center gap-[24px] w-full md:w-1/2">
          <div class="w-[16%] overflow-hidden w-full md:w-1/2">
            <div class="w-[83%] flex flex-col md:flex-row overflow-hidden">
              <div class="w-[19px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[19px] h-[25px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[19px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[22px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[15px] h-[9px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
          </div>
          <div class="hidden md:flex flex-row border-b border-gray-200">
            <button class="border border-gray-900 px-4 py-2 text-sm">Link One</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Two</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Three</button>
            <button class="px-4 py-2 text-sm text-gray-500">Link Four</button>
          </div>
        </div>
        <div class="w-[25%] flex flex-col md:flex-row justify-center items-center gap-[16px] w-full md:w-1/2">
          <div class="w-[69%] flex flex-col md:flex-row items-center gap-[12px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2">
            <div class="w-[10%] overflow-hidden w-full md:w-1/2">
              <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Search</p>
          </div>
          <div class="w-[11%] flex flex-col md:flex-row items-center gap-[4px] p-[8px] w-full md:w-1/2">
            <div class="w-[60%] overflow-hidden w-full md:w-1/2">
              <div class="w-[18px] h-[20px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
          </div>
          <div class="w-[11%] h-[40px] w-full md:w-[11%] bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
        </div>
      </div>
    </section>
  </body>
</html>
