<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Topbar / 2 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1440px] h-[72px] flex flex-row justify-between items-center overflow-hidden">
        <div class="w-[84px] h-[36px] flex flex-row items-center gap-[24px]">
          <div class="w-[84px] h-[36px] overflow-hidden">
            <div class="w-[70px] h-[36px] overflow-hidden">
              <div class="w-[19px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[19px] h-[25px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[19px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[22px] h-[16px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              <div class="w-[15px] h-[9px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
          </div>
        </div>
        <div class="w-[540px] h-[40px] flex flex-row items-center gap-[12px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)]">
          <div class="w-[24px] h-[24px] overflow-hidden">
            <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
          </div>
          <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Search</p>
        </div>
        <div class="w-[96px] h-[40px] flex flex-row justify-center items-center gap-[16px]">
          <div class="w-[40px] h-[40px] flex flex-row items-center gap-[4px] p-[8px]">
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[18px] h-[20px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
          </div>
          <div class="w-[40px] h-[40px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
        </div>
      </div>
    </section>
  </body>
</html>
