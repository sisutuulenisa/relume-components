<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Topbar / 4 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[1144px] flex flex-col md:flex-row justify-between items-center overflow-hidden">
        <div class="w-[8%] flex flex-col md:flex-row items-center gap-[24px] overflow-hidden min-w-0 w-full md:w-1/2">
          <h4 class="text-[20px] font-medium leading-[30px] text-[rgba(0,0,0,1.000)] text-left">Dashboard</h4>
        </div>
        <div class="w-[31%] flex flex-col md:flex-row justify-center items-center gap-[16px] overflow-hidden min-w-0 w-full md:w-1/2">
          <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          <div class="w-[11%] flex flex-col md:flex-row items-center gap-[4px] p-[8px] overflow-hidden min-w-0 w-full md:w-1/2">
            <div class="w-[60%] overflow-hidden min-w-0 w-full md:w-1/2">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </div>
          </div>
          <div class="w-full md:w-1/2 overflow-hidden bg-gray-100 rounded-lg flex items-center justify-center h-[240px]" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
        </div>
      </div>
    </section>
  </body>
</html>
