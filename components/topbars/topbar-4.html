<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Topbar / 4 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <section class="w-full flex flex-col items-center bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1144px] h-[72px] flex flex-row justify-between items-center overflow-hidden">
        <div class="w-[97px] h-[30px] flex flex-row items-center gap-[24px]">
          <h4 class="text-[20px] font-[500] leading-[30px] text-[rgba(0,0,0,1.000)] text-left">Dashboard</h4>
        </div>
        <div class="w-[360px] h-[40px] flex flex-row justify-center items-center gap-[16px]">
          <div class="w-[248px] h-[40px] flex flex-row items-center gap-[12px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)]">
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[18px] h-[18px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]"></div>
            </div>
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Search</p>
          </div>
          <div class="w-[40px] h-[40px] flex flex-row items-center gap-[4px] p-[8px]">
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[18px] h-[20px] bg-[rgba(0,0,0,1.000)]"></div>
            </div>
          </div>
          <div class="w-[40px] h-[40px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
        </div>
      </div>
    </section>
  </body>
</html>
