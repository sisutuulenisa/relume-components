<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Table / 8 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
      <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col gap-20 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-96 flex flex-col">
        <div class="w-full max-w-screen-xl flex flex-col md:flex-row items-end gap-6 p-6 bg-white border border-black overflow-hidden">
          <div class="w-full max-w-screen-md flex flex-col gap-1 min-w-0 md:w-1/2">
            <h3 class="text-2xl font-bold leading-snug text-black text-left">Heading goes here</h3>
            <p class="text-base font-normal leading-normal text-black text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
          </div>
          <div class="flex flex-col md:flex-row justify-end items-center gap-4 overflow-hidden min-w-0 w-full md:w-1/2">
            <div class="flex flex-row items-center gap-6">
              <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
              <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
            </div>
            <button class="w-1/6 flex flex-col md:flex-row justify-center items-center gap-3 p-2 overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg cursor-pointer">
              <div class="w-3/5 overflow-hidden min-w-0 w-full md:w-1/2">
                <i data-lucide="circle" class="w-5 h-5 flex-shrink-0"></i>
              </div>
            </button>
          </div>
        </div>
        <div class="hidden md:flex flex-row border-b border-gray-200">
          <button class="border border-gray-900 px-4 py-2 text-sm">Name</button>
          <button class="px-4 py-2 text-sm text-gray-500">Company</button>
          <button class="px-4 py-2 text-sm text-gray-500">Products</button>
          <button class="px-4 py-2 text-sm text-gray-500">Team</button>
          <button class="px-4 py-2 text-sm text-gray-500">Date</button>
          <button class="px-4 py-2 text-sm text-gray-500">View</button>
        </div>
        <div class="w-full max-w-screen-xl min-h-18 flex flex-col bg-white">
          <div class="hidden md:flex flex-row border-b border-gray-200">
            <button class="border border-gray-900 px-4 py-2 text-sm">Prev</button>
            <button class="px-4 py-2 text-sm text-gray-500">1</button>
            <button class="px-4 py-2 text-sm text-gray-500">Next</button>
          </div>
        </div>
      </div>
    </article>
      <script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
