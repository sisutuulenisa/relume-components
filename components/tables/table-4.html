<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Table / 4 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[91%] flex flex-col">
        <div class="w-[1312px] flex flex-col md:flex-row items-end gap-[24px] p-[24px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)]">
          <div class="w-[76%] flex flex-col gap-[4px] w-full md:w-1/2">
            <h3 class="text-[24px] font-bold leading-[34px] text-[rgba(0,0,0,1.000)] text-left">Heading goes here</h3>
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
          </div>
          <div class="w-[19%] flex flex-col md:flex-row justify-end items-center gap-[16px] w-full md:w-1/2">
            <div class="flex flex-row items-center gap-[24px]">
              <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
              <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
            </div>
            <button class="w-[16%] flex flex-col md:flex-row justify-center items-center gap-[12px] p-[8px] w-full md:w-1/2 bg-gray-900 text-white px-[16px] py-[10px] rounded-[8px] cursor-pointer">
              <div class="w-[60%] overflow-hidden w-full md:w-1/2">
                <div class="w-[16px] h-[4px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              </div>
            </button>
          </div>
        </div>
        <div class="w-[1312px] flex flex-col items-center gap-[12px] p-[24px] border border-[rgba(0,0,0,1.000)]">
          <div class="w-[96%] flex flex-col md:flex-row items-center gap-[12px]">
            <div class="w-[34%] flex flex-col md:flex-row items-center gap-[12px] w-full md:w-1/2">
              <div class="w-[69%] flex flex-col md:flex-row items-center gap-[12px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2">
                <div class="w-[8%] overflow-hidden w-full md:w-1/2">
                  <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Search</p>
              </div>
              <button class="w-[28%] flex flex-col md:flex-row justify-center items-center gap-[12px] px-[20px] py-[8px] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2 bg-gray-900 text-white px-[16px] py-[10px] rounded-[8px] cursor-pointer">
                <div class="w-[20%] overflow-hidden w-full md:w-1/2">
                  <div class="w-[16px] h-[10px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Filters</p>
              </button>
            </div>
            <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-right">Showing 1-50 of 500</p>
          </div>
          <div class="w-[96%] flex flex-col md:flex-row items-center gap-[12px]">
            <div class="w-[6%] flex flex-col md:flex-row flex-wrap items-center gap-[16px] w-full md:w-1/2">
              <div class="w-[82px] flex flex-col md:flex-row justify-center items-center gap-[8px] pl-[16px] pr-[12px] py-[8px] bg-[rgba(255,255,255,1.000)] w-full md:w-1/2">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Tag</p>
                <div class="w-[23%] flex flex-col md:flex-row justify-center items-center gap-[10px] p-[4px] w-full md:w-1/2">
                  <div class="w-[11px] h-[11px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="hidden md:flex flex-row border-b border-gray-200">
          <button class="border border-gray-900 px-4 py-2 text-sm">Name</button>
          <button class="px-4 py-2 text-sm text-gray-500">Company</button>
          <button class="px-4 py-2 text-sm text-gray-500">Number</button>
          <button class="px-4 py-2 text-sm text-gray-500">Team</button>
          <button class="px-4 py-2 text-sm text-gray-500">Date</button>
          <button class="px-4 py-2 text-sm text-gray-500">View</button>
        </div>
        <div class="w-[1312px] flex flex-col bg-[rgba(255,255,255,1.000)]">
          <div class="hidden md:flex flex-row border-b border-gray-200">
            <button class="border border-gray-900 px-4 py-2 text-sm">Prev</button>
            <button class="px-4 py-2 text-sm text-gray-500">1</button>
            <button class="px-4 py-2 text-sm text-gray-500">Next</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
