<!doctype html>
<html lang="en">
  <head>

    <title>Sign up / 7 /</title>

  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-row justify-center items-center bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[720px] h-[900px] flex flex-col items-center">

            <div class="w-[480px] h-[80px] flex flex-col gap-[8px]">

            <div class="w-[480px] h-[80px] flex flex-col gap-[8px]">

              <div class="w-[480px] h-[48px] flex flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]"></div>
            </div>
            <div class="w-[480px] h-[160px] flex flex-col items-center gap-[24px]">

            </div>
          </div>

        <div class="w-[592px] h-[72px] flex flex-row items-center gap-[5px]">
