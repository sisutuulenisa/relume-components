<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up / 9 / — sign-up-and-log-in-pages</title>
  <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-white font-sans antialiased">
<!-- Relume: Sign up / 9 / | Category: sign-up-and-log-in-pages | ID: 4174:123829 -->

<section class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md bg-white border border-gray-200 rounded-xl p-8">
    <div class="text-center mb-8">
      <div class="text-2xl font-bold text-gray-900 mb-1">Brand</div>
      <h1 class="text-xl font-bold text-gray-900">Create an account</h1>
      <p class="text-sm text-gray-500 mt-1">Already have an account? <a href='#' class='underline'>Log in</a></p>
    </div>
    <form class="space-y-4">
      <div><label class='block text-sm font-medium text-gray-700 mb-1'>Name</label><input type='text' class='w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black'></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black"></div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Password</label><input type="password" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-black"></div>
      <div><a href="#" class="inline-flex items-center justify-center px-6 py-3 bg-black text-white text-sm font-semibold rounded-md hover:bg-gray-800 transition-colors">Continue</a></div>
    </form>
    <div class="mt-6 relative">
      <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
      <div class="relative flex justify-center text-xs text-gray-400"><span class="bg-white px-2">or continue with</span></div>
    </div>
    <div class="mt-4 grid grid-cols-2 gap-3">
      <a href="#" class="inline-flex items-center justify-center px-6 py-3 border border-gray-300 text-sm font-semibold rounded-md hover:bg-gray-50 transition-colors">Google</a>
      <a href="#" class="inline-flex items-center justify-center px-6 py-3 border border-gray-300 text-sm font-semibold rounded-md hover:bg-gray-50 transition-colors">GitHub</a>
    </div>
  </div>
</section>

</body>
</html>
