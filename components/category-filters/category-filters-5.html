<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Category Filters / 5 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 px-16 py-28 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-96 flex flex-col items-center gap-20">
        <div class="w-full max-w-screen-md flex flex-col gap-6">
          <h2 class="text-5xl font-bold leading-tight text-black text-center">Collection</h2>
          <p class="text-lg font-normal leading-normal text-black text-center">Lorem ipsum dolor sit amet.</p>
        </div>
        <div class="w-full max-w-screen-xl min-h-96 flex flex-col gap-8">
          <div class="w-full max-w-screen-xl min-h-40 flex flex-col gap-8">
            <div class="hidden md:flex flex-row border-b border-gray-200">
              <button class="border border-gray-900 px-4 py-2 text-sm">Filters</button>
              <button class="px-4 py-2 text-sm text-gray-500">View all</button>
              <button class="px-4 py-2 text-sm text-gray-500">Sort by</button>
            </div>
            <div class="hidden md:flex flex-row border-b border-gray-200">
              <button class="border border-gray-900 px-4 py-2 text-sm">Filter One</button>
              <button class="px-4 py-2 text-sm text-gray-500">Filter Two</button>
              <button class="px-4 py-2 text-sm text-gray-500">Filter Three</button>
              <button class="px-4 py-2 text-sm text-gray-500">Filter Four</button>
            </div>
          </div>
          <div class="w-full max-w-screen-xl flex flex-col gap-8">
            <div class="w-full max-w-screen-xl flex flex-col md:flex-row justify-between items-end gap-6 overflow-hidden">
              <div class="w-[6%] flex flex-col md:flex-row justify-center items-center gap-2 pl-4 pr-3 py-2 bg-neutral-200 overflow-hidden min-w-0 w-full md:w-1/2">
                <p class="text-base font-normal leading-normal text-black text-left">Tag</p>
                <div class="w-[23%] flex flex-col md:flex-row justify-center items-center gap-2 p-1 overflow-hidden min-w-0 w-full md:w-1/2">
                  <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                </div>
              </div>
              <p class="text-sm font-normal leading-normal text-black text-left">Showing 0 of 100</p>
            </div>
            <div class="w-96 h-96 border border-black/15 overflow-hidden"></div>
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
