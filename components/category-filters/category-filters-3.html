<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Category Filters / 3 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] min-h-[1413px] flex flex-col gap-[80px]">
        <div class="w-[60%] flex flex-col gap-[24px]">
          <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Collection</h1>
          <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet.</p>
        </div>
        <div class="w-[1280px] min-h-[1224px] flex flex-col gap-[24px]">
          <div class="flex flex-row items-center gap-[24px]">
            <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Filters</button>
            <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Sort by</button>
          </div>
          <div class="w-[1280px] flex flex-col gap-[32px]">
            <div class="w-[1280px] flex flex-col md:flex-row justify-between items-end gap-[24px] overflow-hidden">
              <div class="w-[6%] flex flex-col md:flex-row justify-center items-center gap-[8px] pl-[16px] pr-[12px] py-[8px] bg-[rgba(238,238,238,1.000)] overflow-hidden min-w-0 w-full md:w-1/2">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Tag</p>
                <div class="w-[23%] flex flex-col md:flex-row justify-center items-center gap-[10px] p-[4px] overflow-hidden min-w-0 w-full md:w-1/2">
                  <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                </div>
              </div>
              <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Showing 0 of 100</p>
            </div>
            <div class="w-[1280px] h-[1080px] border border-[rgba(0,0,0,0.150)] overflow-hidden"></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
