<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Category Filters / 4 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <section class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[1413px] flex flex-col gap-[80px]">
        <div class="w-[768px] h-[109px] flex flex-col gap-[24px]">
          <h1 class="text-[48px] font-[700] leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Collection</h1>
          <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet.</p>
        </div>
        <div class="w-[1280px] h-[1224px] flex flex-col gap-[24px]">
          <div class="w-[1280px] h-[48px] flex flex-row justify-between items-center gap-[24px]">
            <button class="w-[129px] h-[48px] flex flex-row justify-center items-center gap-[12px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)]">
              <div class="w-[24px] h-[24px] overflow-hidden">
                <div class="w-[16px] h-[10px] bg-[rgba(0,0,0,1.000)]"></div>
              </div>
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Filters</p>
            </button>
            <button class="w-[83px] h-[24px] flex flex-row justify-center items-center gap-[8px]">
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sort by</p>
              <div class="w-[24px] h-[24px] overflow-hidden">
                <div class="w-[12px] h-[7px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]"></div>
              </div>
            </button>
          </div>
          <div class="w-[1280px] h-[1152px] flex flex-col gap-[32px]">
            <div class="w-[1280px] h-[40px] flex flex-row justify-between items-end gap-[24px]">
              <div class="w-[82px] h-[40px] flex flex-row justify-center items-center gap-[8px] pl-[16px] pr-[12px] py-[8px] bg-[rgba(238,238,238,1.000)]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Tag</p>
                <div class="w-[19px] h-[19px] flex flex-row justify-center items-center gap-[10px] p-[4px]">
                  <div class="w-[11px] h-[11px] bg-[rgba(0,0,0,1.000)]"></div>
                </div>
              </div>
              <p class="text-[14px] font-[400] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Showing 0 of 100</p>
            </div>
            <div class="w-[1280px] h-[1080px] border border-[rgba(0,0,0,0.150)] overflow-hidden"></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
