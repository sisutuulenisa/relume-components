<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Header / 1 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full max-w-screen-xl mx-auto px-5 md:px-20 ">
      <div class="w-full flex flex-col md:flex-row items-center gap-16">
        <!-- Text column -->
        <div class="w-full md:w-1/2 flex flex-col gap-8">
          <div class="flex flex-col gap-6">
            <h2 class="text-5xl md:text-6xl font-bold leading-tight text-black">Medium length hero headline goes here</h2>
            <p class="text-lg font-normal leading-normal text-gray-600">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
          </div>
          <div class="flex flex-row flex-wrap items-center gap-4">
            <button class="inline-flex items-center gap-2 px-6 py-3 bg-black text-white rounded-lg text-sm font-semibold hover:bg-gray-800 transition-colors">Get started</button>
            <button class="inline-flex items-center gap-2 px-6 py-3 border border-gray-900 text-gray-900 rounded-lg text-sm font-semibold hover:bg-gray-50 transition-colors">Learn more</button>
          </div>
        </div>
        <!-- Image column -->
        <div class="w-full md:w-1/2">
          <div class="w-full aspect-video bg-gray-200 rounded"></div>
        </div>
      </div>
    </article>
      <script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
