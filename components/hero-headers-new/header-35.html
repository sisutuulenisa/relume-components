<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Header / 35 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-row justify-center items-center bg-[rgba(68,68,68,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[319px] flex flex-col items-center gap-[80px]">
        <div class="w-[768px] h-[319px] flex flex-col items-center gap-[32px]">
          <div class="w-[768px] h-[239px] flex flex-col items-center gap-[24px]">
            <h1 class="text-[56px] font-bold leading-[67px] text-[rgba(255,255,255,1.000)] text-center">Medium length hero heading goes here</h1>
            <p class="text-[18px] font-normal leading-[27px] text-[rgba(255,255,255,1.000)] text-center">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
          </div>
          <div class="w-[513px] h-[48px] flex flex-col gap-[16px]">
            <div class="w-[513px] h-[48px] flex flex-row gap-[16px]">
              <div class="w-[399px] h-[48px] flex flex-row items-center gap-[12px] px-[12px] py-[8px] border border-[rgba(255,255,255,1.000)]">
                <div class="w-[24px] h-[24px] overflow-hidden">
                  <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
                </div>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,0.650)] text-left">Search</p>
              </div>
              <button class="w-[98px] h-[48px] flex flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(255,255,255,1.000)] border border-[rgba(255,255,255,1.000)] cursor-pointer">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Search</p>
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
