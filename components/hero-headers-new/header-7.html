<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Header / 7 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col md:flex-row justify-center items-center bg-[rgba(68,68,68,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] flex flex-col gap-[80px] w-full md:w-1/2">
        <div class="w-[44%] flex flex-col gap-[32px]">
          <div class="w-[560px] flex flex-col gap-[24px]">
            <h1 class="text-[56px] font-bold leading-[67px] text-[rgba(255,255,255,1.000)] text-left">Medium length hero heading goes here</h1>
            <p class="text-[18px] font-normal leading-[27px] text-[rgba(255,255,255,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
          </div>
          <div class="flex flex-row items-center gap-[24px]">
            <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
            <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
