<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Header / 5 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full">
      <!-- Full-width hero image -->
      <div class="relative w-full">
        <div class="w-full aspect-video bg-gray-200 rounded"></div>
        <!-- Overlay content -->
        <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-5 md:px-20 bg-black/40 rounded">
          <div class="max-w-3xl flex flex-col gap-6">
            <h2 class="text-4xl md:text-6xl font-bold leading-tight text-white">Medium length hero headline goes here</h2>
            <p class="text-lg font-normal leading-normal text-white/90">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
            <div class="flex flex-row flex-wrap justify-center gap-4 mt-2">
              <button class="inline-flex items-center gap-2 px-6 py-3 bg-white text-black rounded-lg text-sm font-semibold hover:bg-gray-100 transition-colors">Get started</button>
              <button class="inline-flex items-center gap-2 px-6 py-3 border border-white text-white rounded-lg text-sm font-semibold hover:bg-white/10 transition-colors">Learn more</button>
            </div>
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
