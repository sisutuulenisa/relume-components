<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Header / 73 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[1126px] flex flex-col gap-[80px]">
        <div class="w-[768px] h-[326px] flex flex-col gap-[32px]">
          <div class="w-[768px] h-[212px] flex flex-col gap-[24px]">
            <h1 class="text-[56px] font-[700] leading-[67px] text-[rgba(0,0,0,1.000)] text-left">Long heading is what you see here in this header section</h1>
            <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
          </div>
          <div class="w-[513px] h-[82px] flex flex-col gap-[16px]">
            <div class="w-[513px] h-[48px] flex flex-row gap-[16px]">
              <div class="w-[396px] h-[48px] flex flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Enter your email</p>
              </div>
              <button class="w-[101px] h-[48px] flex flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Sign up</p>
              </button>
            </div>
            <div class="w-[513px] h-[18px] flex flex-row gap-[4px]">
              <p class="text-[12px] font-[400] leading-[18px] text-[rgba(0,0,0,1.000)] text-left">By clicking Sign Up you&#x27;re confirming that you agree with our</p>
              <p class="text-[12px] font-[400] leading-[18px] text-[rgba(0,0,0,1.000)] text-left">Terms and Conditions.</p>
            </div>
          </div>
        </div>
        <div class="w-[1280px] h-[720px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
      </div>
    </header>
  </body>
</html>
