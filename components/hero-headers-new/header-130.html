<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Header / 130 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full mx-auto max-w-[1440px] flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden">
      <div class="w-[1280px] h-[624px] flex flex-col gap-[80px]">
        <div class="w-[1280px] h-[624px] flex flex-row items-center gap-[64px]">
          <div class="w-[608px] h-[319px] flex flex-col gap-[32px]">
            <div class="w-[608px] h-[239px] flex flex-col gap-[24px]">
              <h1 class="text-[56px] font-[700] leading-[67px] text-[rgba(0,0,0,1.000)] text-left">Medium length hero heading goes here</h1>
              <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
            </div>
            <div class="w-[208px] h-[48px] flex flex-row gap-[16px]">
              <button class="w-[96px] h-[48px] flex flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Button</p>
              </button>
              <button class="w-[96px] h-[48px] flex flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Button</p>
              </button>
            </div>
          </div>
          <div class="w-[608px] h-[624px]">
            <div class="w-[516px] h-[532px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            <div class="w-[364px] h-[364px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
