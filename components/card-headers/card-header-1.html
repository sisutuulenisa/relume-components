<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Card Header / 1 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <header class="w-full flex flex-row items-end gap-[24px] p-[24px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] mx-auto max-w-[1440px]">
      <div class="w-[744px] h-[62px] flex flex-col gap-[4px]">
        <h3 class="text-[24px] font-[700] leading-[34px] text-[rgba(0,0,0,1.000)] text-left">Heading goes here</h3>
        <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
      </div>
      <div class="w-[248px] h-[40px] flex flex-row justify-end items-center gap-[16px]">
        <div class="w-[192px] h-[40px] flex flex-row gap-[16px]">
          <button class="w-[88px] h-[40px] flex flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] border border-[rgba(0,0,0,1.000)]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Button</p>
          </button>
          <button class="w-[88px] h-[40px] flex flex-row justify-center items-center gap-[8px] px-[20px] py-[8px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Button</p>
          </button>
        </div>
        <button class="w-[40px] h-[40px] flex flex-row justify-center items-center gap-[12px] p-[8px]">
          <div class="w-[24px] h-[24px] overflow-hidden">
            <div class="w-[16px] h-[4px] bg-[rgba(0,0,0,1.000)]"></div>
          </div>
        </button>
      </div>
    </header>
  </body>
</html>
