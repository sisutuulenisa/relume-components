<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topbar sits above a Level 1 sidebar. Includes a company logo but does not have nav links. — topbars</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">
<!-- Relume: Topbar sits above a Level 1 sidebar. Includes a company logo but does not have nav links. | Category: topbars | ID: 4174:122773 -->

<!-- App shell preview -->
<div class="flex h-screen">
  <!-- Sidebar placeholder -->
  <aside class="w-16 bg-gray-900 flex flex-col items-center py-4 gap-4">
    <div class="w-8 h-8 rounded bg-white/10"></div>
    <div class="w-8 h-8 rounded bg-white/10"></div>
    <div class="w-8 h-8 rounded bg-white/10"></div>
  </aside>

  <!-- Main column -->
  <div class="flex-1 flex flex-col">
    <!-- Topbar -->
    <header class="w-full bg-white border-b border-gray-200 h-14 flex items-center px-4 justify-between shrink-0">
      <!-- Company logo -->
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-gray-900 rounded flex items-center justify-center">
          <svg class="w-5 h-5 text-white" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="10" cy="10" r="7"/>
          </svg>
        </div>
        <span class="text-base font-semibold text-gray-900">Company Name</span>
      </div>

      <!-- Right-side actions (no nav links per spec) -->
      <div class="flex items-center gap-3">
        <!-- Notification bell -->
        <button class="p-2 rounded-md hover:bg-gray-100 transition-colors" aria-label="Notifications">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </button>
        <!-- User avatar -->
        <button class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center hover:ring-2 hover:ring-gray-300 transition-all" aria-label="User menu">
          <span class="text-xs font-semibold text-gray-600">JD</span>
        </button>
      </div>
    </header>

    <!-- Content area placeholder -->
    <main class="flex-1 p-6">
      <div class="w-full h-full bg-white rounded-xl border border-gray-200 flex items-center justify-center">
        <p class="text-gray-400 text-sm">Page content goes here</p>
      </div>
    </main>
  </div>
</div>

</body>
</html>
