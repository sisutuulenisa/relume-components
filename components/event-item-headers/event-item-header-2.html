<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event Item Header / 2 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 px-16 py-28 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-96 flex flex-col items-center gap-20">
        <div class="w-full max-w-screen-md min-h-96 flex flex-col justify-center items-center gap-8">
          <div class="w-full max-w-screen-md flex flex-col justify-center items-center gap-6">
            <div class="w-full max-w-screen-md flex flex-col items-center gap-4">
              <p class="text-base font-semibold leading-normal text-black text-center">Tagline</p>
              <div class="w-full max-w-screen-md flex flex-col gap-6">
                <h2 class="text-5xl font-bold leading-tight text-black text-center">Event title heading</h2>
                <p class="text-lg font-normal leading-normal text-black text-center">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
              </div>
            </div>
            <div class="w-full max-w-screen-md flex flex-col justify-center items-center gap-8">
              <div class="w-full max-w-screen-md flex flex-col justify-center items-center gap-4">
                <p class="text-lg font-semibold leading-normal text-black text-center">Sat 10 Feb</p>
                <div class="w-[13%] flex flex-col md:flex-row px-2 py-1 bg-neutral-200 overflow-hidden">
                  <p class="text-sm font-semibold leading-normal text-black text-left">10 Spots left!</p>
                </div>
              </div>
              <div class="hidden md:flex flex-row border-b border-gray-200">
                <button class="border border-gray-900 px-4 py-2 text-sm">45</button>
                <button class="px-4 py-2 text-sm text-gray-500">Tab 2</button>
                <button class="px-4 py-2 text-sm text-gray-500">12</button>
                <button class="px-4 py-2 text-sm text-gray-500">Tab 4</button>
                <button class="px-4 py-2 text-sm text-gray-500">44</button>
                <button class="px-4 py-2 text-sm text-gray-500">Tab 6</button>
                <button class="px-4 py-2 text-sm text-gray-500">29</button>
              </div>
            </div>
          </div>
          <div class="w-[62%] min-h-20 flex flex-col justify-center items-center gap-4">
            <div class="w-96 flex flex-col md:flex-row gap-4 overflow-hidden">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              <button class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-black border border-black text-white rounded-lg cursor-pointer">
                <p class="text-base font-normal leading-normal text-white text-left">Save my spot</p>
              </button>
            </div>
            <p class="text-xs font-normal leading-normal text-black text-left">By clicking Save my spot you&#x27;re confirming that you agree with our Terms and Conditions.</p>
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
