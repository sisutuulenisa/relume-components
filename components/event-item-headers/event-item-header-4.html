<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event Item Header / 4 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 px-16 py-28 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-76 flex flex-col gap-20">
        <section class="w-full max-w-screen-xl flex flex-col md:flex-row items-center gap-20 overflow-hidden">
          <section class="w-1/2 min-h-76 flex flex-col gap-8 min-w-0 w-full md:w-1/2">
            <button class="inline-flex items-center justify-center gap-2 bg-gray-900 text-white px-4 py-2.5 rounded-lg mt-auto cursor-pointer">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
              <p class="text-base font-normal leading-normal text-black text-left">All events</p>
            </button>
            <section class="w-96 flex flex-col gap-6">
              <h2 class="text-5xl font-bold leading-tight text-black text-left">Event title heading</h2>
              <p class="text-lg font-normal leading-normal text-black text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
            </section>
            <section class="w-[80%] min-h-20 flex flex-col gap-4">
              <section class="w-96 flex flex-col md:flex-row gap-4 overflow-hidden">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                <button class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-black border border-black text-white rounded-lg cursor-pointer">
                  <p class="text-base font-normal leading-normal text-white text-left">Save my spot</p>
                </button>
              </section>
              <p class="text-xs font-normal leading-normal text-black text-left">By clicking Save my spot you&#x27;re confirming that you agree with our Terms and Conditions.</p>
            </section>
          </section>
          <section class="w-1/2 flex flex-col items-center gap-6 min-w-0 w-full md:w-1/2">
            <h2 class="text-3xl font-bold leading-snug text-black text-center">Sat 10 Feb</h2>
            <section class="w-2/3 flex flex-col items-center gap-4">
              <div class="hidden md:flex flex-row border-b border-gray-200">
                <button class="border border-gray-900 px-4 py-2 text-sm">45</button>
                <button class="px-4 py-2 text-sm text-gray-500">Tab 2</button>
                <button class="px-4 py-2 text-sm text-gray-500">12</button>
                <button class="px-4 py-2 text-sm text-gray-500">Tab 4</button>
                <button class="px-4 py-2 text-sm text-gray-500">44</button>
                <button class="px-4 py-2 text-sm text-gray-500">Tab 6</button>
                <button class="px-4 py-2 text-sm text-gray-500">29</button>
              </div>
              <section class="w-1/4 flex flex-col md:flex-row px-2 py-1 bg-[rgba(238,238,238,1.000)] overflow-hidden">
                <p class="text-sm font-semibold leading-normal text-black text-left">10 Spots left!</p>
              </section>
            </section>
          </section>
        </section>
      </div>
    </article>
  </body>
</html>
