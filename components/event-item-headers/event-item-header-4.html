<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event Item Header / 4 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] min-h-[306px] flex flex-col gap-[80px]">
        <div class="w-[1280px] flex flex-col md:flex-row items-center gap-[80px] overflow-hidden">
          <div class="w-[47%] min-h-[306px] flex flex-col gap-[32px] min-w-0 w-full md:w-1/2">
            <button class="w-[17%] flex flex-col md:flex-row justify-center items-center gap-[8px] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] mt-auto cursor-pointer">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">All events</p>
            </button>
            <div class="w-[600px] flex flex-col gap-[24px]">
              <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Event title heading</h1>
              <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
            </div>
            <div class="w-[80%] min-h-[82px] flex flex-col gap-[16px]">
              <div class="w-[480px] flex flex-col md:flex-row gap-[16px] overflow-hidden">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
                <button class="w-[30%] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] cursor-pointer">
                  <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Save my spot</p>
                </button>
              </div>
              <p class="text-[12px] font-normal leading-[18px] text-[rgba(0,0,0,1.000)] text-left">By clicking Save my spot you&#x27;re confirming that you agree with our Terms and Conditions.</p>
            </div>
          </div>
          <div class="w-[47%] flex flex-col items-center gap-[24px] min-w-0 w-full md:w-1/2">
            <h2 class="text-[32px] font-bold leading-[42px] text-[rgba(0,0,0,1.000)] text-center">Sat 10 Feb</h2>
            <div class="w-[67%] flex flex-col items-center gap-[16px]">
              <div class="hidden md:flex flex-row border-b border-gray-200">
                <button class="border border-gray-900 px-4 py-2 text-sm">45</button>
                <button class="px-4 py-2 text-sm text-gray-500">Tab 2</button>
                <button class="px-4 py-2 text-sm text-gray-500">12</button>
                <button class="px-4 py-2 text-sm text-gray-500">Tab 4</button>
                <button class="px-4 py-2 text-sm text-gray-500">44</button>
                <button class="px-4 py-2 text-sm text-gray-500">Tab 6</button>
                <button class="px-4 py-2 text-sm text-gray-500">29</button>
              </div>
              <div class="w-[25%] flex flex-col md:flex-row px-[8px] py-[4px] bg-[rgba(238,238,238,1.000)] overflow-hidden">
                <p class="text-[14px] font-semibold leading-[21px] text-[rgba(0,0,0,1.000)] text-left">10 Spots left!</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
