<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Event Item Header / 9 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[1090px] flex flex-col gap-[80px]">
        <div class="w-[1280px] h-[272px] flex flex-row gap-[80px]">
          <div class="w-[736px] h-[272px] flex flex-col gap-[32px]">
            <div class="w-[736px] h-[24px] flex flex-row items-center gap-[8px]">
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Events</p>
              <div class="w-[16px] h-[16px] overflow-hidden">
                <div class="w-[4px] h-[8px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
              </div>
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Events title</p>
            </div>
            <div class="w-[736px] h-[136px] flex flex-col gap-[24px]">
              <h1 class="text-[48px] font-[700] leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Event title heading</h1>
              <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
            </div>
            <div class="w-[294px] h-[48px] flex flex-row gap-[16px]">
              <button class="w-[144px] h-[48px] flex flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Save my spot</p>
              </button>
              <button class="w-[134px] h-[48px] flex flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)]">
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">View events</p>
              </button>
            </div>
          </div>
          <div class="w-[464px] h-[152px] flex flex-col gap-[32px]">
            <div class="w-[464px] h-[60px] flex flex-row gap-[32px]">
              <div class="w-[216px] h-[60px] flex flex-col gap-[8px]">
                <h4 class="text-[20px] font-[700] leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Date</h4>
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sat 10 Feb 2024</p>
              </div>
              <div class="w-[216px] h-[60px] flex flex-col gap-[8px]">
                <h4 class="text-[20px] font-[700] leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Location</h4>
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sydney, Australia</p>
              </div>
            </div>
            <div class="w-[464px] h-[60px] flex flex-row gap-[32px]">
              <div class="w-[216px] h-[60px] flex flex-col gap-[8px]">
                <h4 class="text-[20px] font-[700] leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Speaker</h4>
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Full name</p>
              </div>
              <div class="w-[216px] h-[60px] flex flex-col gap-[8px]">
                <h4 class="text-[20px] font-[700] leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Type</h4>
                <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">In-person</p>
              </div>
            </div>
          </div>
        </div>
        <div class="w-[1280px] h-[738px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
      </div>
    </header>
  </body>
</html>
