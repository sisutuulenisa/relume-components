<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event Item Header / 9 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] min-h-[1090px] flex flex-col gap-[80px]">
        <div class="w-[1280px] flex flex-col md:flex-row gap-[80px] overflow-hidden">
          <div class="w-[57%] min-h-[272px] flex flex-col gap-[32px] min-w-0 w-full md:w-1/2">
            <div class="w-[736px] flex flex-col md:flex-row items-center gap-[8px] overflow-hidden">
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Events</p>
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Events title</p>
            </div>
            <div class="w-[736px] flex flex-col gap-[24px]">
              <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Event title heading</h1>
              <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
            </div>
            <div class="flex flex-row items-center gap-[24px]">
              <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Save my spot</button>
              <button class="bg-gray-900 text-white px-4 py-2.5 rounded">View events</button>
            </div>
          </div>
          <div class="w-[36%] flex flex-col gap-[32px] min-w-0 w-full md:w-1/2">
            <div class="w-[464px] flex flex-col md:flex-row gap-[32px] overflow-hidden">
              <div class="w-[47%] flex flex-col gap-[8px] min-w-0 w-full md:w-1/2">
                <h4 class="text-[20px] font-bold leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Date</h4>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sat 10 Feb 2024</p>
              </div>
              <div class="w-[47%] flex flex-col gap-[8px] min-w-0 w-full md:w-1/2">
                <h4 class="text-[20px] font-bold leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Location</h4>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sydney, Australia</p>
              </div>
            </div>
            <div class="w-[464px] flex flex-col md:flex-row gap-[32px] overflow-hidden">
              <div class="w-[47%] flex flex-col gap-[8px] min-w-0 w-full md:w-1/2">
                <h4 class="text-[20px] font-bold leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Speaker</h4>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Full name</p>
              </div>
              <div class="w-[47%] flex flex-col gap-[8px] min-w-0 w-full md:w-1/2">
                <h4 class="text-[20px] font-bold leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Type</h4>
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">In-person</p>
              </div>
            </div>
          </div>
        </div>
        <div class="w-[1280px] h-[738px] bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
      </div>
    </header>
  </body>
</html>
