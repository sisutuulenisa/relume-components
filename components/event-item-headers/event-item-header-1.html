<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event Item Header / 1 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] flex flex-col gap-[80px]">
        <div class="w-[1280px] flex flex-col md:flex-row items-center gap-[80px]">
          <div class="w-[47%] flex flex-col gap-[32px] w-full md:w-1/2">
            <button class="w-[17%] flex flex-col md:flex-row justify-center items-center gap-[8px] bg-gray-900 text-white px-[16px] py-[10px] rounded-[8px] cursor-pointer">
              <div class="w-[24%] overflow-hidden w-full md:w-1/2">
                <div class="w-[7px] h-[12px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
              </div>
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">All events</p>
            </button>
            <div class="w-[600px] flex flex-col gap-[24px]">
              <div class="w-[600px] flex flex-col gap-[24px]">
                <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Event title heading</h1>
                <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
              </div>
              <div class="w-[600px] flex flex-col gap-[32px]">
                <div class="w-[600px] flex flex-col md:flex-row items-center gap-[16px]">
                  <p class="text-[18px] font-semibold leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Sat 10 Feb</p>
                  <div class="w-[17%] flex flex-col md:flex-row px-[8px] py-[4px] bg-[rgba(238,238,238,1.000)] w-full md:w-1/2">
                    <p class="text-[14px] font-semibold leading-[21px] text-[rgba(0,0,0,1.000)] text-left">10 Spots left!</p>
                  </div>
                </div>
                <div class="hidden md:flex flex-row border-b border-gray-200">
                  <button class="border border-gray-900 px-4 py-2 text-sm">45</button>
                  <button class="px-4 py-2 text-sm text-gray-500">Tab 2</button>
                  <button class="px-4 py-2 text-sm text-gray-500">12</button>
                  <button class="px-4 py-2 text-sm text-gray-500">Tab 4</button>
                  <button class="px-4 py-2 text-sm text-gray-500">44</button>
                  <button class="px-4 py-2 text-sm text-gray-500">Tab 6</button>
                  <button class="px-4 py-2 text-sm text-gray-500">29</button>
                </div>
              </div>
            </div>
            <div class="w-[80%] flex flex-col gap-[16px]">
              <div class="w-[480px] flex flex-col md:flex-row gap-[16px]">
                <div class="w-[67%] flex flex-col md:flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2">
                  <p class="text-[16px] font-normal leading-[24px] text-[rgba(102,102,102,1.000)] text-left">Enter your email</p>
                </div>
                <button class="w-[30%] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2 cursor-pointer">
                  <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Save my spot</p>
                </button>
              </div>
              <p class="text-[12px] font-normal leading-[18px] text-[rgba(0,0,0,1.000)] text-left">By clicking Save my spot you&#x27;re confirming that you agree with our Terms and Conditions.</p>
            </div>
          </div>
          <div class="w-[47%] h-[600px] w-full md:w-[47%] bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
        </div>
      </div>
    </header>
  </body>
</html>
