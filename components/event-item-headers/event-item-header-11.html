<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event Item Header / 11 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 px-16 py-28 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-96 flex flex-col gap-20">
        <div class="w-full max-w-screen-xl flex flex-col md:flex-row items-center gap-20 overflow-hidden">
          <div class="w-1/2 flex flex-col gap-8 min-w-0 w-full md:w-1/2">
            <div class="w-96 flex flex-col md:flex-row items-center gap-2 overflow-hidden">
              <p class="text-base font-normal leading-normal text-black text-center">Events</p>
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
              <p class="text-base font-normal leading-normal text-black text-center">Event title</p>
            </div>
            <div class="w-96 flex flex-col gap-6">
              <h2 class="text-5xl font-bold leading-tight text-black text-left">Event title heading</h2>
              <p class="text-lg font-normal leading-normal text-black text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
              <div class="hidden md:flex flex-row border-b border-gray-200">
                <button class="border border-gray-900 px-4 py-2 text-sm">Sat 10 Feb 2024</button>
                <button class="px-4 py-2 text-sm text-gray-500">Location</button>
                <button class="px-4 py-2 text-sm text-gray-500">Speakers</button>
              </div>
            </div>
          </div>
          <div class="w-1/2 min-h-96 flex flex-col gap-6 p-8 bg-white border border-[rgba(0,0,0,1.000)] min-w-0 w-full md:w-1/2">
            <div class="w-11/12 flex flex-col md:flex-row gap-6 overflow-hidden">
              <div class="w-1/2 flex flex-col gap-2 min-w-0 w-full md:w-1/2">
                <p class="text-base font-normal leading-normal text-black text-left">First name</p>
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              </div>
              <div class="w-1/2 flex flex-col gap-2 min-w-0 w-full md:w-1/2">
                <p class="text-base font-normal leading-normal text-black text-left">Last name</p>
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              </div>
            </div>
            <div class="w-11/12 flex flex-col md:flex-row gap-6 overflow-hidden">
              <div class="w-1/2 flex flex-col gap-2 min-w-0 w-full md:w-1/2">
                <p class="text-base font-normal leading-normal text-black text-left">Email</p>
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              </div>
              <div class="w-1/2 flex flex-col gap-2 min-w-0 w-full md:w-1/2">
                <p class="text-base font-normal leading-normal text-black text-left">Phone number</p>
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              </div>
            </div>
            <div class="w-11/12 flex flex-col gap-2">
              <p class="text-base font-normal leading-normal text-black text-left">Choose a topic</p>
              <div class="w-96 flex flex-col md:flex-row items-center gap-4 p-3 border border-[rgba(0,0,0,1.000)] overflow-hidden">
                <p class="text-base font-normal leading-normal text-[rgba(102,102,102,1.000)] text-left">Select one...</p>
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
              </div>
            </div>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
            <button class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-black border border-black text-white rounded-lg mt-auto cursor-pointer">
              <p class="text-base font-normal leading-normal text-white text-left">Save my spot</p>
            </button>
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
