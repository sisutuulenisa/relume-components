<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Sign up - Modal / 2 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col justify-center items-center p-[16px] bg-[rgba(0,0,0,0.250)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[480px] h-[701px] flex flex-col items-center gap-[32px] p-[48px] bg-[rgba(255,255,255,1.000)]">
        <div class="w-[384px] h-[109px] flex flex-col items-center gap-[24px]">
          <h1 class="text-[48px] font-[700] leading-[58px] text-[rgba(0,0,0,1.000)] text-center">Sign Up</h1>
          <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-center">Lorem ipsum dolor sit amet.</p>
        </div>
        <div class="w-[384px] h-[464px] flex flex-col justify-center items-center gap-[16px]">
          <div class="w-[384px] h-[48px] flex flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Email</p>
          </div>
          <div class="w-[384px] h-[48px] flex flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Password</p>
          </div>
          <button class="w-[384px] h-[48px] flex flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Sign Up</p>
          </button>
          <div class="w-[384px] h-[32px] flex flex-col">
            <div class="w-[384px] border border-[rgba(0,0,0,1.000)]"></div>
          </div>
          <button class="w-[384px] h-[48px] flex flex-row justify-center items-center gap-[12px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)]">
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[18px] h-[18px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            </div>
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sign Up with Google</p>
          </button>
          <button class="w-[384px] h-[48px] flex flex-row justify-center items-center gap-[12px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)]">
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[20px] h-[20px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            </div>
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sign Up with Facebook</p>
          </button>
          <button class="w-[384px] h-[48px] flex flex-row justify-center items-center gap-[12px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)]">
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[17px] h-[20px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            </div>
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sign Up with Apple</p>
          </button>
          <div class="w-[231px] h-[32px] flex flex-row items-center gap-[5px]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Already have an account?</p>
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-center underline">Log In</p>
          </div>
        </div>
      </div>
      <div class="w-[32px] h-[32px] overflow-hidden">
        <div class="w-[24px] h-[24px] overflow-hidden">
          <div class="w-[13px] h-[13px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
        </div>
      </div>
    </section>
  </body>
</html>
