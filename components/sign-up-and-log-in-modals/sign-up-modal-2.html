<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign up - Modal / 2 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col justify-center items-center p-4 bg-black/25 overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <section class="w-1/3 min-h-96 flex flex-col items-center gap-8 p-12 bg-white">
        <section class="w-[80%] flex flex-col items-center gap-6">
          <h2 class="text-5xl font-bold leading-tight text-black text-center">Sign Up</h2>
          <p class="text-lg font-normal leading-normal text-black text-center">Lorem ipsum dolor sit amet.</p>
        </section>
        <div class="w-[80%] min-h-96 flex flex-col justify-center items-center gap-4">
          <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          <button class="w-96 flex flex-col md:flex-row justify-center items-center gap-2 px-6 py-3 bg-black border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
            <p class="text-base font-normal leading-normal text-white text-left">Sign Up</p>
          </button>
          <div class="w-96 flex flex-col">
            <div class="w-96 h-0 border border-[rgba(0,0,0,1.000)]"></div>
          </div>
          <button class="w-96 flex flex-col md:flex-row justify-center items-center gap-3 px-6 py-3 border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
            <div class="w-[6%] overflow-hidden min-w-0 w-full md:w-1/2">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </div>
            <p class="text-base font-normal leading-normal text-black text-left">Sign Up with Google</p>
          </button>
          <button class="w-96 flex flex-col md:flex-row justify-center items-center gap-3 px-6 py-3 border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
            <div class="w-[6%] overflow-hidden min-w-0 w-full md:w-1/2">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </div>
            <p class="text-base font-normal leading-normal text-black text-left">Sign Up with Facebook</p>
          </button>
          <button class="w-96 flex flex-col md:flex-row justify-center items-center gap-3 px-6 py-3 border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
            <div class="w-[6%] overflow-hidden min-w-0 w-full md:w-1/2">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </div>
            <p class="text-base font-normal leading-normal text-black text-left">Sign Up with Apple</p>
          </button>
          <div class="w-3/5 flex flex-col md:flex-row items-center gap-1 overflow-hidden">
            <p class="text-base font-normal leading-normal text-black text-center">Already have an account?</p>
            <p class="text-base font-normal leading-normal text-black text-center underline">Log In</p>
          </div>
        </div>
      </section>
      <div class="w-[2%] overflow-hidden">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
      </div>
    </article>
  </body>
</html>
