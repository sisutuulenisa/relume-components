<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Modal / 2 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col justify-center items-center p-[16px] bg-[rgba(0,0,0,0.250)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[33%] min-h-[741px] flex flex-col items-center gap-[32px] p-[48px] bg-[rgba(255,255,255,1.000)]">
        <div class="w-[80%] flex flex-col items-center gap-[24px]">
          <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-center">Log In</h1>
          <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-center">Lorem ipsum dolor sit amet.</p>
        </div>
        <div class="w-[80%] min-h-[504px] flex flex-col justify-center items-center gap-[24px]">
          <div class="w-[384px] min-h-[416px] flex flex-col justify-center items-center gap-[16px]">
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            <button class="w-[384px] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] mt-auto cursor-pointer">
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Log In</p>
            </button>
            <div class="w-[384px] flex flex-col">
              <div class="w-[384px] border border-[rgba(0,0,0,1.000)]"></div>
            </div>
            <button class="w-[384px] flex flex-col md:flex-row justify-center items-center gap-[12px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] mt-auto cursor-pointer">
              <div class="w-[6%] overflow-hidden min-w-0 w-full md:w-1/2">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              </div>
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Log in with Google</p>
            </button>
            <button class="w-[384px] flex flex-col md:flex-row justify-center items-center gap-[12px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] mt-auto cursor-pointer">
              <div class="w-[6%] overflow-hidden min-w-0 w-full md:w-1/2">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              </div>
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Log in with Facebook</p>
            </button>
            <button class="w-[384px] flex flex-col md:flex-row justify-center items-center gap-[12px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] mt-auto cursor-pointer">
              <div class="w-[6%] overflow-hidden min-w-0 w-full md:w-1/2">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              </div>
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Log in with Apple</p>
            </button>
          </div>
          <div class="w-[58%] flex flex-col items-center gap-[16px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-center underline">Forgot your password?</p>
            <div class="w-[224px] flex flex-col md:flex-row items-center gap-[5px] overflow-hidden">
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Don&#x27;t have an account?</p>
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-center underline">Sign Up</p>
            </div>
          </div>
        </div>
      </div>
      <div class="w-[2%] overflow-hidden">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
      </div>

</html>
