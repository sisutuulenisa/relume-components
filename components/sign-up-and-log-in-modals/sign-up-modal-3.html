<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign up - Modal / 3 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col justify-center items-center p-4 bg-[rgba(0,0,0,0.250)] overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <section class="w-1/3 min-h-96 flex flex-col items-center gap-8 p-12 bg-white">
        <section class="w-[80%] flex flex-col md:flex-row overflow-hidden">
          <div class="w-1/2 min-h-12 flex flex-col min-w-0 w-full md:w-1/2">
            <button class="w-48 min-h-12 flex flex-col justify-center items-center px-6 py-3 bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
              <p class="text-base font-normal leading-normal text-black text-left">Sign Up</p>
            </button>
            <figure class="w-48 h-1 bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></figure>
          </div>
          <button class="w-1/2 flex flex-col md:flex-row justify-center items-center gap-2 px-6 py-3 overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg cursor-pointer">
            <p class="text-base font-normal leading-normal text-black text-left">Login</p>
          </button>
        </section>
        <section class="w-[80%] min-h-96 flex flex-col justify-center items-center gap-6">
          <section class="w-96 flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Name*</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </section>
          <section class="w-96 flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Email*</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </section>
          <section class="w-96 flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Password*</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </section>
          <button class="w-96 min-h-28 flex flex-col justify-center items-center gap-4 bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
            <button class="w-96 flex flex-col md:flex-row justify-center items-center gap-2 px-6 py-3 bg-black border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
              <p class="text-base font-normal leading-normal text-white text-left">Sign Up</p>
            </button>
            <button class="w-96 flex flex-col md:flex-row justify-center items-center gap-3 px-6 py-3 border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
              <section class="w-[6%] overflow-hidden min-w-0 w-full md:w-1/2">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              </section>
              <p class="text-base font-normal leading-normal text-black text-left">Sign Up with Google</p>
            </button>
          </button>
        </section>
      </section>
      <section class="w-[2%] overflow-hidden">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
      </section>
    </article>
  </body>
</html>
