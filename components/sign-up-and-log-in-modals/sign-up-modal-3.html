<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign up - Modal / 3 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col justify-center items-center p-[16px] bg-[rgba(0,0,0,0.250)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[33%] min-h-[601px] flex flex-col items-center gap-[32px] p-[48px] bg-[rgba(255,255,255,1.000)]">
        <div class="w-[80%] flex flex-col md:flex-row overflow-hidden">
          <div class="w-[50%] min-h-[49px] flex flex-col min-w-0 w-full md:w-1/2">
            <button class="w-[192px] min-h-[48px] flex flex-col justify-center items-center px-[24px] py-[12px] bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] mt-auto cursor-pointer">
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sign Up</p>
            </button>
            <div class="w-[192px] h-[1px] bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
          </div>
          <button class="w-[50%] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] cursor-pointer">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Login</p>
          </button>
        </div>
        <div class="w-[80%] min-h-[424px] flex flex-col justify-center items-center gap-[24px]">
          <div class="w-[384px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Name*</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
          <div class="w-[384px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Email*</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
          <div class="w-[384px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Password*</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
          <button class="w-[384px] min-h-[112px] flex flex-col justify-center items-center gap-[16px] bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] mt-auto cursor-pointer">
            <button class="w-[384px] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] mt-auto cursor-pointer">
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Sign Up</p>
            </button>
            <button class="w-[384px] flex flex-col md:flex-row justify-center items-center gap-[12px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)] overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] mt-auto cursor-pointer">
              <div class="w-[6%] overflow-hidden min-w-0 w-full md:w-1/2">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
              </div>
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sign Up with Google</p>
            </button>
          </button>
        </div>
      </div>
      <div class="w-[2%] overflow-hidden">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
      </div>
    </section>
  </body>
</html>
