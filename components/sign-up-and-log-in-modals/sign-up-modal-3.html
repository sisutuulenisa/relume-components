<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Sign up - Modal / 3 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <section class="w-full flex flex-col justify-center items-center p-[16px] bg-[rgba(0,0,0,0.250)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[480px] h-[601px] flex flex-col items-center gap-[32px] p-[48px] bg-[rgba(255,255,255,1.000)]">
        <div class="w-[384px] h-[49px] flex flex-row">
          <div class="w-[192px] h-[49px] flex flex-col">
            <div class="w-[192px] h-[48px] flex flex-col justify-center items-center px-[24px] py-[12px]">
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sign Up</p>
            </div>
            <div class="w-[192px] h-[1px] bg-[rgba(0,0,0,1.000)]"></div>
          </div>
          <div class="w-[192px] h-[48px] flex flex-row justify-center items-center gap-[8px] px-[24px] py-[12px]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Login</p>
          </div>
        </div>
        <div class="w-[384px] h-[424px] flex flex-col justify-center items-center gap-[24px]">
          <div class="w-[384px] h-[80px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Name*</p>
            <div class="w-[384px] h-[48px] flex flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]"></div>
          </div>
          <div class="w-[384px] h-[80px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Email*</p>
            <div class="w-[384px] h-[48px] flex flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]"></div>
          </div>
          <div class="w-[384px] h-[80px] flex flex-col gap-[8px]">
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Password*</p>
            <div class="w-[384px] h-[48px] flex flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)]"></div>
          </div>
          <div class="w-[384px] h-[112px] flex flex-col justify-center items-center gap-[16px]">
            <button class="w-[384px] h-[48px] flex flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)]">
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Sign Up</p>
            </button>
            <button class="w-[384px] h-[48px] flex flex-row justify-center items-center gap-[12px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)]">
              <div class="w-[24px] h-[24px] overflow-hidden">
                <div class="w-[18px] h-[18px] bg-[rgba(0,0,0,1.000)]"></div>
              </div>
              <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sign Up with Google</p>
            </button>
          </div>
        </div>
      </div>
      <div class="w-[32px] h-[32px] overflow-hidden">
        <div class="w-[24px] h-[24px] overflow-hidden">
          <div class="w-[13px] h-[13px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)]"></div>
        </div>
      </div>
    </section>
  </body>
</html>
