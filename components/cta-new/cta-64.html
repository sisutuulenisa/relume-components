<!doctype html>
<html lang="en">

  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1440px] h-[532px] flex flex-col gap-[80px] px-[64px] py-[112px]">
        <div class="w-[1280px] h-[308px] flex flex-col gap-[80px]">
          <div class="w-[768px] h-[308px] flex flex-col gap-[32px]">
            <div class="w-[768px] h-[194px] flex flex-col gap-[24px]">
              <h1 class="text-[48px] font-[700] leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Long heading is what you see here in this call to action section</h1>
              <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
            </div>
            <div class="w-[513px] h-[82px] flex flex-col gap-[16px]">

                  <p class="text-[16px] font-[400] leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Sign Up</p>
                </button>
              </div>
              <p class="text-[12px] font-[400] leading-[18px] text-[rgba(0,0,0,1.000)] text-left">By clicking Sign Up you&#x27;re confirming that you agree with our Terms and Conditions.</p>
            </div>
          </div>

      <div class="w-[1440px] h-[810px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
