<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CTA / 50 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
      <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-49 flex flex-col gap-20">
        <div class="w-full max-w-screen-xl flex flex-col md:flex-row items-center gap-8 p-12 bg-neutral-700 border border-black overflow-hidden">
          <div class="w-1/2 flex flex-col gap-6 min-w-0 w-full md:w-1/2">
            <h2 class="text-4xl font-bold leading-tight text-white text-left">Medium length heading goes here</h2>
            <p class="text-lg font-normal leading-normal text-white text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
          </div>
          <div class="w-2/5 min-h-20 flex flex-col gap-4 min-w-0 w-full md:w-1/2">
            <div class="w-96 flex flex-col md:flex-row gap-4 overflow-hidden">
              <i data-lucide="circle" class="w-5 h-5 flex-shrink-0"></i>
              <button class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-white text-black border border-white rounded-lg cursor-pointer">
                <p class="text-base font-normal leading-normal text-black text-left">Sign Up</p>
              </button>
            </div>
            <p class="text-xs font-normal leading-normal text-white text-left">By clicking Sign Up you&#x27;re confirming that you agree with our Terms and Conditions.</p>
          </div>
        </div>
      </div>
    </article>
      <script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
