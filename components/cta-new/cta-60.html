<!doctype html>
<html lang="en">
  <head>

    <link rel="stylesheet" href="../../dist/tailwind.css">

</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl flex flex-col md:flex-row overflow-hidden">
        <div class="w-full max-w-screen-sm min-h-96 flex flex-col justify-center items-end gap-8 pl-16 pr-20 py-28 min-w-0 md:w-1/2">
          <div class="min-h-77 flex flex-col gap-8">
            <div class="w-96 flex flex-col gap-6">
              <h2 class="text-5xl font-bold leading-tight text-black text-left">Medium length heading goes here</h2>

            </div>

                <button class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-black text-white border border-black rounded-lg cursor-pointer">

            </div>
          </div>
        </div>
        <figure class="w-full md:w-1/2 overflow-hidden bg-gray-100 rounded-lg flex items-center justify-center h-60" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></figure>
      </div>
