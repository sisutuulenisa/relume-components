<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CTA / 46 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] flex flex-col gap-[80px]">
        <div class="w-[1280px] flex flex-col md:flex-row items-center gap-[32px] p-[48px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)]">
          <div class="w-[50%] flex flex-col gap-[24px] w-full md:w-1/2">
            <h1 class="text-[40px] font-bold leading-[48px] text-[rgba(0,0,0,1.000)] text-left">Medium length heading goes here</h1>
            <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
          </div>
          <div class="w-[40%] flex flex-col gap-[16px] w-full md:w-1/2">
            <div class="w-[513px] flex flex-col md:flex-row gap-[16px]">
              <div class="w-[77%] flex flex-col md:flex-row items-center gap-[8px] p-[12px] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Enter your email</p>
              </div>
              <button class="w-[20%] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] bg-[rgba(0,0,0,1.000)] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2 cursor-pointer">
                <p class="text-[16px] font-normal leading-[24px] text-[rgba(255,255,255,1.000)] text-left">Sign Up</p>
              </button>
            </div>
            <p class="text-[12px] font-normal leading-[18px] text-[rgba(0,0,0,1.000)] text-left">By clicking Sign Up you&#x27;re confirming that you agree with our Terms and Conditions.</p>
          </div>
        </div>
      </div>
    </section>
  </body>
