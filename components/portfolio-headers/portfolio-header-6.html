<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Header / 6 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[1440px] h-[600px] bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
      <div class="w-[1440px] flex flex-col md:flex-row justify-center gap-[80px] px-[64px] py-[80px] overflow-hidden">
        <div class="w-[89%] flex flex-col gap-[80px] min-w-0 w-full md:w-1/2">
          <div class="w-[1280px] flex flex-col md:flex-row gap-[80px] overflow-hidden">
            <div class="w-[56%] flex flex-col gap-[24px] min-w-0 w-full md:w-1/2">
              <div class="w-[720px] flex flex-col gap-[24px]">
                <h1 class="text-[56px] font-bold leading-[67px] text-[rgba(0,0,0,1.000)] text-left">Project name here</h1>
                <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
              </div>
              <div class="hidden md:flex flex-row border-b border-gray-200">
                <button class="border border-gray-900 px-4 py-2 text-sm">Tag one</button>
                <button class="px-4 py-2 text-sm text-gray-500">Tag two</button>
                <button class="px-4 py-2 text-sm text-gray-500">Tag three</button>
              </div>
            </div>
            <div class="w-[38%] flex flex-col gap-[32px] min-w-0 w-full md:w-1/2">
              <div class="w-[480px] flex flex-col md:flex-row gap-[32px] overflow-hidden">
                <div class="w-[47%] flex flex-col gap-[8px] min-w-0 w-full md:w-1/2">
                  <h4 class="text-[20px] font-bold leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Client</h4>
                  <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Full name</p>
                </div>
                <div class="w-[47%] flex flex-col gap-[8px] min-w-0 w-full md:w-1/2">
                  <h4 class="text-[20px] font-bold leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Date</h4>
                  <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">March 2023</p>
                </div>
              </div>
              <div class="w-[480px] flex flex-col md:flex-row gap-[32px] overflow-hidden">
                <div class="w-[47%] flex flex-col gap-[8px] min-w-0 w-full md:w-1/2">
                  <h4 class="text-[20px] font-bold leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Role</h4>
                  <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Role name</p>
                </div>
                <div class="w-[47%] flex flex-col gap-[8px] min-w-0 w-full md:w-1/2">
                  <h4 class="text-[20px] font-bold leading-[28px] text-[rgba(0,0,0,1.000)] text-left">Website</h4>
                  <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left underline">www.relume.io</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
