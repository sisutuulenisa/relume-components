<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Portfolio Header / 10 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1440px] h-[600px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
      <div class="w-[1440px] h-[280px] flex flex-row justify-center gap-[80px] px-[64px] py-[80px]">
        <div class="w-[1280px] h-[120px] flex flex-col gap-[80px]">
          <div class="w-[1280px] h-[120px] flex flex-row gap-[80px]">
            <div class="w-[600px] h-[120px] flex flex-col gap-[24px]">
              <h1 class="text-[56px] font-[700] leading-[67px] text-[rgba(0,0,0,1.000)] text-left">Project name here</h1>
              <div class="w-[600px] h-[29px] flex flex-row flex-wrap gap-[8px]">
                <div class="w-[66px] h-[29px] flex flex-row px-[8px] py-[4px] bg-[rgba(238,238,238,1.000)]">
                  <p class="text-[14px] font-[600] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Tag one</p>
                </div>
                <div class="w-[66px] h-[29px] flex flex-row px-[8px] py-[4px] bg-[rgba(238,238,238,1.000)]">
                  <p class="text-[14px] font-[600] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Tag two</p>
                </div>
                <div class="w-[76px] h-[29px] flex flex-row px-[8px] py-[4px] bg-[rgba(238,238,238,1.000)]">
                  <p class="text-[14px] font-[600] leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Tag three</p>
                </div>
              </div>
            </div>
            <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
