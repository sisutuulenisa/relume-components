<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio Header / 7 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 px-16 py-28 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl flex flex-col gap-20">
        <section class="w-full max-w-screen-xl flex flex-col md:flex-row gap-20 overflow-hidden">
          <div class="w-full max-w-screen-sm flex flex-col gap-6 min-w-0 md:w-1/2">
            <section class="w-full max-w-screen-sm flex flex-col gap-5">
              <h2 class="text-6xl font-bold leading-tight text-black text-left">Project name here</h2>
              <p class="text-lg font-normal leading-normal text-black text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
            </section>
            <div class="hidden md:flex flex-row border-b border-gray-200">
              <button class="border border-gray-900 px-4 py-2 text-sm">Tag one</button>
              <button class="px-4 py-2 text-sm text-gray-500">Tag two</button>
              <button class="px-4 py-2 text-sm text-gray-500">Tag three</button>
            </div>
          </div>
          <section class="w-[38%] flex flex-col gap-8 min-w-0 w-full md:w-1/2">
            <section class="w-96 flex flex-col md:flex-row gap-8 overflow-hidden">
              <section class="w-1/2 flex flex-col gap-2 min-w-0 w-full md:w-1/2">
                <h4 class="text-xl font-bold leading-snug text-black text-left">Client</h4>
                <p class="text-base font-normal leading-normal text-black text-left">Full name</p>
              </section>
              <section class="w-1/2 flex flex-col gap-2 min-w-0 w-full md:w-1/2">
                <h4 class="text-xl font-bold leading-snug text-black text-left">Date</h4>
                <p class="text-base font-normal leading-normal text-black text-left">March 2023</p>
              </section>
            </section>
            <section class="w-96 flex flex-col md:flex-row gap-8 overflow-hidden">
              <section class="w-1/2 flex flex-col gap-2 min-w-0 w-full md:w-1/2">
                <h4 class="text-xl font-bold leading-snug text-black text-left">Role</h4>
                <p class="text-base font-normal leading-normal text-black text-left">Role name</p>
              </section>
              <section class="w-1/2 flex flex-col gap-2 min-w-0 w-full md:w-1/2">
                <h4 class="text-xl font-bold leading-snug text-black text-left">Website</h4>
                <p class="text-base font-normal leading-normal text-black text-left underline">www.relume.io</p>
              </section>
            </section>
          </section>
        </section>
        <figure class="w-96 h-96 bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></figure>
      </div>
    </article>
  </body>
</html>
