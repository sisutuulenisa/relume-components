<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=1440" />
    <title>Layout / 518 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <section class="w-full flex flex-col justify-center items-center gap-[80px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">

                </div>

                  <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Button</p>
                  <div class="w-[24px] h-[24px] overflow-hidden">
                    <div class="w-[7px] h-[12px] bg-gray-200" role="img" aria-label="Image placeholder"></div>

                </button>

            </div>
            <div class="w-[528px] h-[389px] flex flex-col justify-center gap-[32px] p-[32px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)]">
              <div class="w-[464px] h-[176px] flex flex-col items-center gap-[16px]">

                  <p class="text-[16px] font-[400] leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
                </div>
              </div>

                  <div class="w-[24px] h-[24px] overflow-hidden">

        </div>
      </div>

</html>
