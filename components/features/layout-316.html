<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Layout / 316 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full py-20 px-6 bg-white">
      <div class="max-w-screen-xl mx-auto">
        <div class="flex flex-col md:flex-row gap-16 items-center">
          <div class="md:w-1/2 flex flex-col gap-6">
            <p class="text-sm font-semibold uppercase tracking-wider text-gray-500">Tagline</p>
            <h2 class="text-4xl font-bold text-gray-900">Medium length section heading goes here</h2>
            <p class="text-lg text-gray-600">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare.</p>
            <div class="flex gap-4 flex-wrap">
              <button class="px-6 py-3 bg-black text-white rounded-md text-sm font-semibold hover:bg-gray-800 transition-colors">Get started</button>
              <button class="px-6 py-3 border border-gray-900 text-gray-900 rounded-md text-sm font-semibold hover:bg-gray-50 transition-colors">Learn more</button>
            </div>
          </div>
          <figure class="md:w-1/2 w-full min-h-96 flex items-center justify-center overflow-hidden bg-gray-100 rounded-lg" role="img" aria-label="Image placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg>
          </figure>
        </div>
      </div>
    </section>
  </body>
</html>
