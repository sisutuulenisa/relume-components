<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=1440" />
    <title>Layout / 424 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <section class="w-full flex flex-col justify-center items-center gap-[80px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[155px] flex flex-col justify-center items-center gap-[16px]">
        <div class="w-[53px] h-[24px] flex flex-row items-center">
          <p class="text-[16px] font-[600] leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Tagline</p>
        </div>
        <h1 class="text-[96px] font-[700] leading-[115px] text-[rgba(0,0,0,1.000)] text-center">Heading one</h1>
      </div>
    </section>
  </body>
</html>
