<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Layout / 258 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-12 px-6 md:py-20 bg-neutral-700 overflow-hidden mx-auto max-w-screen-xl">

      <!-- Tab navigation — light colours on dark background -->
      <div class="w-full max-w-screen-xl flex flex-col gap-8">
        <div class="flex flex-row border-b border-neutral-500">
          <button class="border-b-2 border-white px-5 py-3 text-sm font-semibold text-white">Tab One</button>
          <button class="px-5 py-3 text-sm text-neutral-400 hover:text-white transition-colors">Tab Two</button>
          <button class="px-5 py-3 text-sm text-neutral-400 hover:text-white transition-colors">Tab Three</button>
        </div>

        <!-- Tab content panel -->
        <div class="w-full flex flex-col md:flex-row gap-12 items-center">
          <!-- Text column -->
          <div class="md:w-1/2 flex flex-col gap-6">
            <p class="text-sm font-semibold uppercase tracking-wider text-neutral-400">Tagline</p>
            <h2 class="text-4xl font-bold leading-tight text-white">Medium length section heading goes here</h2>
            <p class="text-lg text-neutral-300">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare.</p>
            <div class="flex gap-4 flex-wrap">
              <button class="px-6 py-3 bg-white text-gray-900 rounded-md text-sm font-semibold hover:bg-gray-100 transition-colors">Get started</button>
              <button class="px-6 py-3 border border-neutral-400 text-white rounded-md text-sm font-semibold hover:border-white transition-colors">Learn more</button>
            </div>
          </div>

          <!-- Image column -->
          <figure class="md:w-1/2 w-full min-h-64 flex items-center justify-center overflow-hidden bg-neutral-600 rounded-lg" role="img" aria-label="Image placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-neutral-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg>
          </figure>
        </div>
      </div>

    </article>
      <script>if(window.lucide){lucide.createIcons();}</script>
</body>
</html>
