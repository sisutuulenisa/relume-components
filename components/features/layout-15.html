<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Layout / 15 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <section class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px]">
      <div class="w-[1280px] h-[640px] flex flex-col gap-[80px]">
        <div class="w-[1280px] h-[640px] flex flex-row items-center gap-[80px]">
          <div class="w-[600px] h-[289px] flex flex-col gap-[24px]">
            <div class="w-[600px] h-[201px] flex flex-col gap-[24px]">
              <h1 class="text-[40px] font-[700] leading-[48px] text-[rgba(0,0,0,1.000)] text-left">Long heading is what you see here in this feature section</h1>
              <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
            </div>
            <div class="w-[600px] h-[64px] flex flex-row flex-wrap gap-[32px]">
              <div class="w-[120px] h-[48px] overflow-hidden">
                <div class="w-[116px] h-[19px] bg-[rgba(0,0,0,1.000)]"></div>
              </div>
              <div class="w-[120px] h-[48px] overflow-hidden">
                <div class="w-[114px] h-[31px] bg-[rgba(0,0,0,1.000)]"></div>
              </div>
              <div class="w-[120px] h-[48px] overflow-hidden">
                <div class="w-[116px] h-[19px] bg-[rgba(0,0,0,1.000)]"></div>
              </div>
              <div class="w-[120px] h-[48px] overflow-hidden">
                <div class="w-[114px] h-[31px] bg-[rgba(0,0,0,1.000)]"></div>
              </div>
            </div>
          </div>
          <div class="w-[600px] h-[640px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
        </div>
      </div>
    </section>
  </body>
</html>
