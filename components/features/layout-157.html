<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Layout / 157 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 px-16 py-28 bg-white overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-96 flex flex-col items-center gap-20">
        <figure class="w-full max-w-screen-xl overflow-hidden bg-gray-100 rounded-lg flex items-center justify-center h-60" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></figure>
        <div class="w-full max-w-screen-md min-h-85 flex flex-col items-center gap-8">
          <div class="w-full max-w-screen-md flex flex-col items-center gap-4">
            <div class="w-[7%] flex flex-col md:flex-row items-center overflow-hidden">
              <p class="text-base font-semibold leading-normal text-black text-center">Tagline</p>
            </div>
            <div class="w-full max-w-screen-md flex flex-col items-center gap-6">
              <h2 class="text-5xl font-bold leading-tight text-black text-center">Medium length section heading goes here</h2>
              <p class="text-lg font-normal leading-normal text-black text-center">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
            </div>
          </div>
          <div class="flex flex-row items-center gap-6">
            <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
            <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button →</button>
          </div>
        </div>
      </div>
    </article>
  </body>
</html>
