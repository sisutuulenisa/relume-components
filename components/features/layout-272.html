<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Layout / 272 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col items-center gap-20 px-16 py-28 bg-neutral-700 overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl min-h-96 flex flex-col gap-20">
        <section class="w-full max-w-screen-md flex flex-col gap-4">
          <div class="w-[7%] flex flex-col md:flex-row items-center overflow-hidden">
            <p class="text-base font-semibold leading-normal text-white text-left">Tagline</p>
          </div>
          <section class="w-full max-w-screen-md flex flex-col gap-6">
            <h2 class="text-5xl font-bold leading-tight text-white text-left">Medium length section heading goes here</h2>
            <p class="text-lg font-normal leading-normal text-white text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
          </section>
        </section>
        <div class="hidden md:flex flex-row border-b border-gray-200">
          <button class="border border-gray-900 px-4 py-2 text-sm">Medium length section heading goes here</button>
          <button class="px-4 py-2 text-sm text-gray-500">Medium length section heading goes here</button>
          <button class="px-4 py-2 text-sm text-gray-500">Medium length section heading goes here</button>
        </div>
        <div class="flex flex-row items-center gap-6">
          <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
          <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button →</button>
        </div>
      </div>
    </article>
  </body>
</html>
