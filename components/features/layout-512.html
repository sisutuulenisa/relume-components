<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Layout / 512 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] min-h-[704px] flex flex-col gap-[80px]">
        <div class="w-[1280px] flex flex-col md:flex-row items-center gap-[80px] overflow-hidden">
          <div class="w-[47%] flex flex-col justify-center items-center gap-[64px] min-w-0 w-full md:w-1/2">
            <div class="w-[600px] flex flex-col md:flex-row justify-center gap-[8px] overflow-hidden">
              <div class="w-full md:w-1/2 overflow-hidden bg-gray-100 rounded-lg flex items-center justify-center h-[240px]" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
            </div>
            <div class="hidden md:flex flex-row border-b border-gray-200">
              <button class="border border-gray-900 px-4 py-2 text-sm">Tab One</button>
              <button class="px-4 py-2 text-sm text-gray-500">Tab Two</button>
              <button class="px-4 py-2 text-sm text-gray-500">Tab Three</button>
            </div>
          </div>
          <div class="w-[47%] min-h-[445px] flex flex-col gap-[32px] min-w-0 w-full md:w-1/2">
            <div class="w-[600px] flex flex-col gap-[16px]">
              <div class="w-[9%] flex flex-col md:flex-row items-center overflow-hidden">
                <p class="text-[16px] font-semibold leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Tagline</p>
              </div>
              <div class="w-[600px] flex flex-col gap-[24px]">
                <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Medium length section heading goes here</h1>
                <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique. Duis cursus, mi quis viverra ornare, eros dolor interdum nulla, ut commodo diam libero vitae erat.</p>
              </div>
            </div>
            <div class="flex flex-row items-center gap-[24px]">
              <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
              <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
            </div>
          </div>
        </div>
      </div>
    </section>

</html>
