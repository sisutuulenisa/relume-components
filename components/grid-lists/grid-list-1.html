<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grid List / 1 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col bg-white mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-lg flex flex-col md:flex-row items-end gap-6 bg-white overflow-hidden">
        <div class="w-full max-w-screen-md flex flex-col gap-2 min-w-0 md:w-1/2">
          <h3 class="text-2xl font-bold leading-snug text-black text-left">People you may know</h3>
          <p class="text-base font-normal leading-normal text-black text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
        </div>
        <div class="w-[23%] flex flex-col md:flex-row justify-end items-center gap-4 overflow-hidden min-w-0 w-full md:w-1/2">
          <div class="flex flex-row items-center gap-6">
            <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
            <button class="border border-gray-900 text-gray-900 px-4 py-2.5 rounded bg-transparent">Button</button>
          </div>
          <button class="w-1/6 flex flex-col md:flex-row justify-center items-center gap-3 p-2 overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg cursor-pointer">
            <div class="w-3/5 overflow-hidden min-w-0 w-full md:w-1/2">
              <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            </div>
          </button>
        </div>
      </div>
      <div class="w-full max-w-screen-lg min-h-96 flex flex-col gap-6">
        <div class="hidden md:flex flex-row border-b border-gray-200">
          <button class="border border-gray-900 px-4 py-2 text-sm">Full name</button>
          <button class="px-4 py-2 text-sm text-gray-500">Full name</button>
          <button class="px-4 py-2 text-sm text-gray-500">Full name</button>
        </div>
        <div class="hidden md:flex flex-row border-b border-gray-200">
          <button class="border border-gray-900 px-4 py-2 text-sm">Full name</button>
          <button class="px-4 py-2 text-sm text-gray-500">Full name</button>
          <button class="px-4 py-2 text-sm text-gray-500">Full name</button>
        </div>
      </div>
    </article>
  </body>
</html>
