<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grid List / 3 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[1064px] flex flex-col md:flex-row justify-center items-end gap-[24px] bg-[rgba(255,255,255,1.000)]">
        <div class="w-[61%] flex flex-col gap-[8px] w-full md:w-1/2">
          <h3 class="text-[24px] font-bold leading-[34px] text-[rgba(0,0,0,1.000)] text-left">Connections</h3>
          <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
        </div>
        <div class="w-[37%] flex flex-col md:flex-row justify-end items-center gap-[16px] w-full md:w-1/2">
          <div class="w-[63%] flex flex-col md:flex-row items-center gap-[12px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2">
            <div class="w-[10%] overflow-hidden w-full md:w-1/2">
              <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Search</p>
          </div>
          <div class="w-[33%] flex flex-col md:flex-row items-center gap-[16px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sort by</p>
            <div class="w-[19%] overflow-hidden w-full md:w-1/2">
              <div class="w-[12px] h-[7px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="w-[1064px] flex flex-col gap-[24px]">
        <div class="hidden md:flex flex-row border-b border-gray-200">
          <button class="border border-gray-900 px-4 py-2 text-sm">Full name</button>
          <button class="px-4 py-2 text-sm text-gray-500">Full name</button>
          <button class="px-4 py-2 text-sm text-gray-500">Full name</button>
        </div>
        <div class="hidden md:flex flex-row border-b border-gray-200">
          <button class="border border-gray-900 px-4 py-2 text-sm">Full name</button>
          <button class="px-4 py-2 text-sm text-gray-500">Full name</button>
          <button class="px-4 py-2 text-sm text-gray-500">Full name</button>
        </div>
      </div>
    </section>
  </body>
</html>
