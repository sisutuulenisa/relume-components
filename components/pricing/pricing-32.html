<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pricing / 32 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] flex flex-col items-center gap-[80px]">
        <div class="w-[60%] flex flex-col items-center gap-[16px]">
          <div class="w-[7%] flex flex-col md:flex-row items-center">
            <p class="text-[16px] font-semibold leading-[24px] text-[rgba(0,0,0,1.000)] text-center">Tagline</p>
          </div>
          <div class="w-[768px] flex flex-col items-center gap-[24px]">
            <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-center">Pricing plan</h1>
            <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-center">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
          </div>
        </div>
        <div class="w-[1280px] flex flex-col items-center gap-[48px]">
          <div class="w-[16%] flex flex-col md:flex-row p-[4px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)]">
            <div class="w-[51%] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[24px] py-[8px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2">
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Monthly</p>
            </div>
            <div class="w-[45%] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[24px] py-[8px] w-full md:w-1/2">
              <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Yearly</p>
            </div>
          </div>
          <div class="hidden md:flex flex-row border-b border-gray-200">
            <button class="border border-gray-900 px-4 py-2 text-sm">Free plan</button>
            <button class="px-4 py-2 text-sm text-gray-500">Basic plan</button>
            <button class="px-4 py-2 text-sm text-gray-500">Business plan</button>
            <button class="px-4 py-2 text-sm text-gray-500">Enterprise plan</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
