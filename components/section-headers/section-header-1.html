<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Section Header / 1 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
</head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col md:flex-row items-end gap-[24px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[76%] flex flex-col gap-[8px] min-w-0 w-full md:w-1/2">
        <h3 class="text-[24px] font-bold leading-[34px] text-[rgba(0,0,0,1.000)] text-left">Heading goes here</h3>
        <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
      </div>
      <div class="w-[22%] flex flex-col md:flex-row justify-end items-center gap-[16px] overflow-hidden min-w-0 w-full md:w-1/2">
        <div class="flex flex-row items-center gap-[24px]">
          <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
          <button class="bg-gray-900 text-white px-4 py-2.5 rounded">Button</button>
        </div>
        <button class="w-[16%] flex flex-col md:flex-row justify-center items-center gap-[12px] p-[8px] overflow-hidden min-w-0 w-full md:w-1/2 bg-gray-900 text-white px-4 py-2.5 rounded px-[16px] py-[10px] rounded-[8px] cursor-pointer">
          <div class="w-[60%] overflow-hidden min-w-0 w-full md:w-1/2">
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
        </button>
      </div>
    </header>
  </body>
</html>
