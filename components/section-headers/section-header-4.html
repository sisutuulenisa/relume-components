<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Section Header / 4 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { min-width: 1440px; overflow-x: auto; margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col gap-[8px] bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px]">
      <div class="w-[1144px] h-[66px] flex flex-row items-end gap-[24px]">
        <div class="w-[728px] h-[66px] flex flex-col gap-[8px]">
          <h3 class="text-[24px] font-bold leading-[34px] text-[rgba(0,0,0,1.000)] text-left">Heading goes here</h3>
          <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
        </div>
        <div class="w-[392px] h-[40px] flex flex-row justify-end items-center gap-[16px]">
          <div class="w-[248px] h-[40px] flex flex-row items-center gap-[12px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)]">
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[18px] h-[18px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,0.600)] text-left">Search</p>
          </div>
          <div class="w-[128px] h-[40px] flex flex-row items-center gap-[16px] px-[12px] py-[8px] border border-[rgba(0,0,0,1.000)]">
            <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Sort by</p>
            <div class="w-[24px] h-[24px] overflow-hidden">
              <div class="w-[12px] h-[7px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="w-[1144px] h-[40px] flex flex-row gap-[24px]">
        <div class="w-[59px] h-[40px] flex flex-col gap-[8px] border border-[rgba(0,0,0,1.000)]">
          <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Tab One</p>
        </div>
        <div class="w-[61px] h-[40px] flex flex-col gap-[8px]">
          <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Tab Two</p>
        </div>
        <div class="w-[71px] h-[40px] flex flex-col gap-[8px]">
          <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Tab Three</p>
        </div>
      </div>
    </header>
  </body>
</html>
