<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shadows</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <section class="w-full flex flex-col gap-[64px] p-[64px] bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[91%] flex flex-row items-center">
        <div class="w-[9%] overflow-hidden">
          <div class="w-[83%] flex flex-row overflow-hidden">
            <div class="w-[25px] h-[21px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            <div class="w-[26px] h-[33px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            <div class="w-[25px] h-[21px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            <div class="w-[29px] h-[22px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
            <div class="w-[20px] h-[12px] bg-gray-400 rounded-sm flex-shrink-0" role="img" aria-label="Icon placeholder"></div>
          </div>
        </div>
      </div>
      <div class="w-[71%] flex flex-col gap-[24px]">
        <h1 class="text-[56px] font-bold leading-[67px] text-[rgba(0,0,0,1.000)] text-left">Shadows</h1>
      </div>
      <div class="hidden md:flex flex-row border-b border-gray-200">
        <button class="border border-gray-900 px-4 py-2 text-sm">xxsmall</button>
        <button class="px-4 py-2 text-sm text-gray-500">xsmall</button>
        <button class="px-4 py-2 text-sm text-gray-500">small</button>
        <button class="px-4 py-2 text-sm text-gray-500">medium</button>
        <button class="px-4 py-2 text-sm text-gray-500">large</button>
        <button class="px-4 py-2 text-sm text-gray-500">xlarge</button>
        <button class="px-4 py-2 text-sm text-gray-500">xxlarge</button>
      </div>
    </section>
  </body>
</html>
