<!doctype html>

    <title>Shadows</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col gap-16 p-16 bg-white mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-xl flex flex-row items-center overflow-hidden">
        <section class="w-1/12 overflow-hidden min-w-0">
          <section class="w-5/6 flex flex-row overflow-hidden">
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </section>
        </section>
      </div>
      <section class="w-full max-w-screen-lg flex flex-col gap-6">
        <h2 class="text-6xl font-bold leading-tight text-black text-left">Shadows</h2>
      </section>
      <div class="hidden md:flex flex-row border-b border-gray-200">
        <button class="border border-gray-900 px-4 py-2 text-sm">xxsmall</button>
        <button class="px-4 py-2 text-sm text-gray-500">xsmall</button>
        <button class="px-4 py-2 text-sm text-gray-500">small</button>
        <button class="px-4 py-2 text-sm text-gray-500">medium</button>
        <button class="px-4 py-2 text-sm text-gray-500">large</button>
        <button class="px-4 py-2 text-sm text-gray-500">xlarge</button>
        <button class="px-4 py-2 text-sm text-gray-500">xxlarge</button>
      </div>
    </article>
  </body>
</html>
