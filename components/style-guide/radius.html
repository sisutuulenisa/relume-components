<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440" />
    <title>Radius</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Components are designed for 1440px desktop — render at that width */
      html, body { min-width: 1440px; overflow-x: auto; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased">
    <section class="w-full flex flex-col gap-[64px] p-[64px] bg-[rgba(255,255,255,1.000)] mx-auto max-w-[1440px]">
      <div class="w-[1312px] h-[48px] flex flex-row items-center">
        <div class="w-[112px] h-[48px] overflow-hidden">
          <div class="w-[93px] h-[48px] overflow-hidden">
            <div class="w-[25px] h-[21px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            <div class="w-[26px] h-[33px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            <div class="w-[25px] h-[21px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            <div class="w-[29px] h-[22px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
            <div class="w-[20px] h-[12px] bg-gray-200" role="img" aria-label="Image placeholder"></div>
          </div>
        </div>
      </div>
      <div class="w-[1024px] h-[68px] flex flex-col gap-[24px]">
        <h1 class="text-[56px] font-[700] leading-[67px] text-[rgba(0,0,0,1.000)] text-left">Radius</h1>
      </div>
      <div class="w-[1312px] h-[1759px] flex flex-col gap-[80px]">
        <div class="w-[1312px] h-[757px] flex flex-col gap-[40px]">
          <div class="w-[1312px] h-[77px] flex flex-col gap-[8px]">
            <h2 class="text-[32px] font-[700] leading-[42px] text-[rgba(0,0,0,1.000)] text-left">Large</h2>
            <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Large radius is applied to elements which are 1 or 2 columns in width.</p>
          </div>
          <div class="w-[1312px] h-[640px] flex flex-row gap-[32px]">
            <div class="w-[640px] h-[640px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden"></div>
            <div class="w-[640px] h-[640px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden"></div>
          </div>
        </div>
        <div class="w-[1312px] h-[533px] flex flex-col gap-[40px]">
          <div class="w-[1312px] h-[77px] flex flex-col gap-[8px]">
            <h2 class="text-[32px] font-[700] leading-[42px] text-[rgba(0,0,0,1.000)] text-left">Medium</h2>
            <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Medium radius is applied to elements which are between 2 and 3 columns in width.</p>
          </div>
          <div class="w-[1312px] h-[416px] flex flex-row gap-[32px]">
            <div class="w-[416px] h-[416px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden"></div>
            <div class="w-[416px] h-[416px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden"></div>
            <div class="w-[416px] h-[416px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden"></div>
          </div>
        </div>
        <div class="w-[1312px] h-[309px] flex flex-col gap-[40px]">
          <div class="w-[1312px] h-[77px] flex flex-col gap-[8px]">
            <h2 class="text-[32px] font-[700] leading-[42px] text-[rgba(0,0,0,1.000)] text-left">Small</h2>
            <p class="text-[18px] font-[400] leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Small radius is applied to elements which are smaller than 4 columns in width.</p>
          </div>
          <div class="w-[1312px] h-[192px] flex flex-row gap-[32px]">
            <div class="w-[192px] h-[192px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden"></div>
            <div class="w-[192px] h-[192px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden"></div>
            <div class="w-[192px] h-[192px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden"></div>
            <div class="w-[192px] h-[192px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden"></div>
            <div class="w-[192px] h-[192px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden"></div>
            <div class="w-[192px] h-[192px] bg-[rgba(255,255,255,1.000)] border border-[rgba(0,0,0,1.000)] overflow-hidden"></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
