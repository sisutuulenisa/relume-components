<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Modal / 1 /</title>
    <link rel="stylesheet" href="../../dist/tailwind.css">
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <article class="w-full flex flex-col md:flex-row justify-center items-center bg-black/25 overflow-hidden mx-auto max-w-screen-xl px-5 md:px-20">
      <div class="w-full max-w-screen-md min-h-96 flex flex-col items-center gap-12 p-16 bg-white overflow-hidden min-w-0 md:w-1/2">
        <div class="w-full max-w-screen-sm flex flex-col items-center gap-4">
          <h2 class="text-5xl font-bold leading-tight text-black text-center">Contact us</h2>
          <p class="text-lg font-normal leading-normal text-black text-center">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        </div>
        <div class="w-full max-w-screen-sm min-h-96 flex flex-col items-center gap-6">
          <div class="w-full max-w-screen-sm flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Name</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
          <div class="w-full max-w-screen-sm flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Email</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
          <div class="w-full max-w-screen-sm flex flex-col gap-2">
            <p class="text-base font-normal leading-normal text-black text-left">Message</p>
            <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
          </div>
          <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
          <button class="w-[15%] flex flex-col md:flex-row justify-center items-center gap-2 px-6 py-3 bg-black border border-black overflow-hidden bg-gray-900 text-white px-4 py-2.5 rounded rounded-lg mt-auto cursor-pointer">
            <p class="text-base font-normal leading-normal text-white text-left">Submit</p>
          </button>
        </div>
      </div>
      <div class="w-[2%] overflow-hidden min-w-0 w-full md:w-1/2">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="7"/></svg>
      </div>
    </article>
  </body>
</html>
