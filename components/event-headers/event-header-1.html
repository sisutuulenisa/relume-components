<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Event Header / 1 /</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body { margin: 0; padding: 0; }
    </style>
  </head>
  <body class="bg-white text-gray-900 antialiased font-sans">
    <header class="w-full flex flex-col items-center gap-[80px] px-[64px] py-[112px] bg-[rgba(255,255,255,1.000)] overflow-hidden mx-auto max-w-[1440px] px-[20px] md:px-[80px]">
      <div class="w-[89%] flex flex-col gap-[80px]">
        <div class="w-[60%] flex flex-col gap-[16px]">
          <div class="w-[7%] flex flex-col md:flex-row items-center">
            <p class="text-[16px] font-semibold leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Tagline</p>
          </div>
          <div class="w-[768px] flex flex-col items-center gap-[24px]">
            <h1 class="text-[48px] font-bold leading-[58px] text-[rgba(0,0,0,1.000)] text-left">Events</h1>
            <p class="text-[18px] font-normal leading-[27px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros elementum tristique.</p>
          </div>
        </div>
        <div class="w-[1280px] flex flex-col gap-[64px]">
          <div class="w-[1280px] flex flex-col md:flex-row items-center gap-[48px]">
            <div class="w-[48%] flex flex-col gap-[10px] w-full md:w-1/2">
              <div class="w-[616px] h-[411px] bg-gray-100 rounded-lg flex items-center justify-center" role="img" aria-label="Image placeholder"><svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="currentColor" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg></div>
              <div class="w-[18%] flex flex-col justify-center items-center px-[4px] py-[12px] bg-[rgba(255,255,255,1.000)] overflow-hidden">
                <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Sat</p>
                <h2 class="text-[32px] font-bold leading-[42px] text-[rgba(0,0,0,1.000)] text-center">10</h2>
                <p class="text-[14px] font-normal leading-[21px] text-[rgba(0,0,0,1.000)] text-center">Feb 2024</p>
              </div>
            </div>
            <div class="w-[48%] flex flex-col justify-center gap-[24px] w-full md:w-1/2">
              <div class="w-[616px] flex flex-col gap-[16px]">
                <div class="w-[616px] flex flex-col md:flex-row flex-wrap items-center gap-[16px]">
                  <div class="w-[12%] flex flex-col md:flex-row px-[8px] py-[4px] bg-[rgba(238,238,238,1.000)] w-full md:w-1/2">
                    <p class="text-[14px] font-semibold leading-[21px] text-[rgba(0,0,0,1.000)] text-left">Category</p>
                  </div>
                </div>
                <div class="w-[616px] flex flex-col gap-[8px]">
                  <div class="w-[616px] flex flex-col justify-center">
                    <h3 class="text-[24px] font-bold leading-[34px] text-[rgba(0,0,0,1.000)] text-left">Event title heading</h3>
                    <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Location</p>
                  </div>
                  <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Suspendisse varius enim in eros.</p>
                </div>
              </div>
              <div class="w-[23%] flex flex-col md:flex-row gap-[16px]">
                <button class="w-[144px] flex flex-col md:flex-row justify-center items-center gap-[8px] px-[24px] py-[12px] border border-[rgba(0,0,0,1.000)] w-full md:w-1/2 bg-gray-900 text-white px-[16px] py-[10px] rounded-[8px] cursor-pointer">
                  <p class="text-[16px] font-normal leading-[24px] text-[rgba(0,0,0,1.000)] text-left">Save my spot</p>
                </button>
              </div>
            </div>
          </div>
          <div class="w-[1280px] flex flex-col gap-[48px]">
            <div class="hidden md:flex flex-row border-b border-gray-200">
              <button class="border border-gray-900 px-4 py-2 text-sm">View all</button>
              <button class="px-4 py-2 text-sm text-gray-500">Category one</button>
              <button class="px-4 py-2 text-sm text-gray-500">Category two</button>
              <button class="px-4 py-2 text-sm text-gray-500">Category three</button>
              <button class="px-4 py-2 text-sm text-gray-500">Category four</button>
            </div>
            <div class="w-[1280px] flex flex-col">
              <div class="hidden md:flex flex-row border-b border-gray-200">
                <button class="border border-gray-900 px-4 py-2 text-sm">Fri</button>
                <button class="px-4 py-2 text-sm text-gray-500">Event title heading</button>
                <button class="px-4 py-2 text-sm text-gray-500">Save my spot</button>
              </div>
              <div class="hidden md:flex flex-row border-b border-gray-200">
                <button class="border border-gray-900 px-4 py-2 text-sm">Sat</button>
                <button class="px-4 py-2 text-sm text-gray-500">Event title heading</button>
                <button class="px-4 py-2 text-sm text-gray-500">Save my spot</button>
              </div>
              <div class="hidden md:flex flex-row border-b border-gray-200">
                <button class="border border-gray-900 px-4 py-2 text-sm">Sun</button>
                <button class="px-4 py-2 text-sm text-gray-500">Event title heading</button>
                <button class="px-4 py-2 text-sm text-gray-500">Save my spot</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
